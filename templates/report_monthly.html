{% extends "base.html" %}
{% block content %}
<div class="page-header"><h1>📆 月报表</h1></div>
<div class="toolbar">
<input type="month" id="month-picker" style="padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px">
<select id="team-filter" onchange="loadData()" style="padding:7px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:13px"><option value="">全部班组</option></select>
<button class="btn btn-primary" onclick="loadData()">查询</button>
</div>
<div class="card"><div class="card-body">
<div class="table-wrap">
<table>
<thead><tr>
<th style="min-width:80px">姓名</th>
<th style="min-width:70px">班组</th>
<th style="min-width:50px">出勤</th>
<th style="min-width:70px">打卡工时</th>
<th style="min-width:70px">正常工时</th>
<th style="min-width:70px">加班工时</th>
<th style="min-width:70px">生产工时</th>
<th style="min-width:60px">总产量</th>
<th style="min-width:60px">良品率</th>
<th style="min-width:70px">平均效率</th>
<th style="min-width:60px">加班天</th>
<th style="min-width:70px">工时利用率</th>
<th style="min-width:70px">日均产量</th>
<th style="min-width:60px">达成率</th>
<th style="min-width:60px">请假天</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div></div>

{% endblock %}
{% block scripts %}
<script>
(function(){
    var now=new Date();var mm=now.getFullYear()+"-"+("0"+(now.getMonth()+1)).slice(-2);document.getElementById("month-picker").value=mm;
    fetch("/api/teams").then(function(r){return r.json()}).then(function(d){
        var sel=document.getElementById("team-filter");
        d.forEach(function(t){var o=document.createElement("option");o.value=t.id;o.textContent=t.name;sel.appendChild(o);});
        loadData();
    });
})();
function loadData(){
    var m=document.getElementById("month-picker").value;
    var tid=document.getElementById("team-filter").value;
    var url="/api/reports/monthly?month="+m;
    if(tid)url+="&team_id="+tid;
    fetch(url).then(function(r){return r.json()}).then(function(d){
        var tb=document.getElementById("tbody");tb.innerHTML="";
        if(!d.data||d.data.length===0){tb.innerHTML='<tr><td colspan="15" style="text-align:center;color:#9ca3af;padding:40px">暂无数据</td></tr>';return;}
        d.data.forEach(function(r){
            var tr=document.createElement("tr");
            var gr=r.good_rate>0?r.good_rate+'%':'<span style="color:#9ca3af">-</span>';
            var eff=r.avg_efficiency>0?(r.avg_efficiency>=100?'<span style="color:#059669">'+r.avg_efficiency+'%</span>':'<span style="color:#dc2626">'+r.avg_efficiency+'%</span>'):'<span style="color:#9ca3af">-</span>';
            var leave=r.leave_days>0?'<span style="color:#dc2626;font-weight:600">'+r.leave_days+'</span>':'0';
            tr.innerHTML='<td><strong>'+r.name+'</strong></td><td>'+(r.department||'')+'</td><td>'+r.work_days+'</td><td>'+(r.total_attendance_hours||0)+'h</td><td>'+(r.normal_hours||0)+'h</td><td>'+(r.overtime_hours||0)+'h</td><td>'+((r.total_production_hours||0)>0?((r.total_production_hours||0)<(r.total_attendance_hours||0)?'<span style="color:#dc2626">'+(r.total_production_hours||0)+'h</span>':(r.total_production_hours||0)+'h'):'<span style="color:#9ca3af">-</span>')+'</td><td>'+(r.total_qty||0)+'</td><td>'+gr+'</td><td>'+((r.avg_efficiency||0)>0?((r.avg_efficiency||0)>=100?'<span style="color:#059669">'+(r.avg_efficiency||0)+'%</span>':'<span style="color:#dc2626">'+(r.avg_efficiency||0)+'%</span>'):'<span style="color:#9ca3af">-</span>')+'</td><td>'+(r.overtime_days||0)+'</td><td>'+((r.utilization_rate||0)>0?((r.utilization_rate||0)>=100?'<span style="color:#059669">'+(r.utilization_rate||0)+'%</span>':'<span style="color:#dc2626">'+(r.utilization_rate||0)+'%</span>'):'<span style="color:#9ca3af">-</span>')+'</td><td>'+(r.daily_avg_qty||0)+'</td><td>'+(r.achieve_rate||0)+'%</td><td>'+leave+'</td>';
            tb.appendChild(tr);
        });
    });
}

</script>
{% endblock %}
