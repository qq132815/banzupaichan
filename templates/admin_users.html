{% extends "base.html" %}
{% block content %}
<div class="page-header"><h1>👤 账户管理</h1>
<div class="page-actions"><button class="btn btn-primary" onclick="showAdd()">＋ 新增用户</button></div>
</div>
<div class="card"><div class="card-body"><div class="table-wrap"><table>
<thead><tr><th>用户名</th><th>显示名</th><th>角色</th><th>所属班组</th><th>状态</th><th>操作</th></tr></thead>
<tbody id="tbody"></tbody>
</table></div></div></div>
<div class="modal-overlay" id="modal"><div class="modal">
<div class="modal-header"><h3 id="m-title">新增用户</h3><button class="modal-close" onclick="closeM()">&times;</button></div>
<div class="modal-body">
<div class="form-row"><div class="form-group"><label>用户名</label><input class="form-control" id="m-username"></div><div class="form-group"><label>密码</label><input class="form-control" id="m-password" placeholder="默认123456"></div></div>
<div class="form-row"><div class="form-group"><label>显示名</label><input class="form-control" id="m-display"></div><div class="form-group"><label>角色</label><select class="form-control" id="m-role"><option value="team">班组</option><option value="planner">计划员</option><option value="admin">管理员</option></select></div></div>
<div class="form-group"><label>所属班组</label><select class="form-control" id="m-team"><option value="">-- 无 --</option></select></div>
</div>
<div class="modal-footer"><button class="btn btn-secondary" onclick="closeM()">取消</button><button class="btn btn-primary" onclick="save()">保存</button></div>
</div></div>
{% endblock %}
{% block scripts %}
<script>
var editId=null,teams=[];
fetch("/api/teams").then(function(r){return r.json()}).then(function(d){teams=d;var sel=document.getElementById("m-team");d.forEach(function(t){var o=document.createElement("option");o.value=t.id;o.textContent=t.name;sel.appendChild(o);});});
function load(){fetch("/api/users").then(function(r){return r.json()}).then(function(d){var tb=document.getElementById("tbody");tb.innerHTML="";d.forEach(function(u){var tr=document.createElement("tr");tr.innerHTML='<td>'+u.username+'</td><td>'+u.display_name+'</td><td><span class="badge badge-'+(u.role==='admin'?'red':(u.role==='planner'?'blue':'green'))+'">'+(u.role==='planner'?'计划员':(u.role==='admin'?'管理员':'班组'))+'</span></td><td>'+(u.team_name||'-')+'</td><td>'+(u.is_active?'<span class="badge badge-green">正常</span>':'<span class="badge badge-red">禁用</span>')+'</td><td><div class="btn-group"><button class="btn btn-outline btn-sm" onclick="edit('+u.id+')">编辑</button><button class="btn btn-warning btn-sm" onclick="resetPwd('+u.id+')">重置密码</button>'+(u.username!=='admin'?'<button class="btn btn-danger btn-sm" onclick="deleteUser('+u.id+')">删除</button>':'')+'</div></td>';tb.appendChild(tr);});});}
function showAdd(){editId=null;document.getElementById("m-title").textContent="新增用户";document.getElementById("m-username").value="";document.getElementById("m-password").value="";document.getElementById("m-display").value="";document.getElementById("m-role").value="team";document.getElementById("m-team").value="";document.getElementById("m-username").disabled=false;document.getElementById("modal").classList.add("show");}
function closeM(){document.getElementById("modal").classList.remove("show");}
function edit(id){fetch("/api/users").then(function(r){return r.json()}).then(function(d){var u=d.find(function(x){return x.id===id});if(!u)return;editId=id;document.getElementById("m-title").textContent="编辑用户";document.getElementById("m-username").value=u.username;document.getElementById("m-username").disabled=true;document.getElementById("m-password").value="";document.getElementById("m-display").value=u.display_name;document.getElementById("m-role").value=u.role;document.getElementById("m-team").value=u.team_id||"";document.getElementById("modal").classList.add("show");});}
function save(){
if(editId){var data={display_name:document.getElementById("m-display").value,role:document.getElementById("m-role").value,team_id:document.getElementById("m-team").value?parseInt(document.getElementById("m-team").value):null,is_active:1};api("/api/users/"+editId,{method:"PUT",body:data}).then(function(){toast("保存成功","success");closeM();load();});}
else{var data={username:document.getElementById("m-username").value,password:document.getElementById("m-password").value||"123456",display_name:document.getElementById("m-display").value,role:document.getElementById("m-role").value,team_id:document.getElementById("m-team").value?parseInt(document.getElementById("m-team").value):null};if(!data.username||!data.display_name){toast("必填","warning");return;}api("/api/users",{method:"POST",body:data}).then(function(){toast("创建成功","success");closeM();load();}).catch(function(){toast("创建失败(用户名重复?)","error");});}
}
function resetPwd(id){if(!confirm("重置密码为123456？"))return;api("/api/users/"+id+"/reset-password",{method:"POST",body:{new_password:"123456"}}).then(function(){toast("已重置","success");});}
function deleteUser(id){if(!confirm("确定删除？"))return;api("/api/users/"+id,{method:"DELETE"}).then(function(){toast("已删除","success");load();});}
load();
</script>
{% endblock %}
