{% extends "base.html" %}
{% block content %}
<div class="page-header"><h1>📊 效率日报</h1></div>
<div class="toolbar">
<input type="date" id="report-date" style="padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px">
<select id="team-filter" onchange="loadData()" style="padding:7px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:13px"><option value="">全部班组</option></select>
<button class="btn btn-primary" onclick="loadData()">查询</button>
</div>
<div class="card"><div class="card-body">
<div class="table-wrap">
<table class="report-table">
<thead><tr>
<th style="min-width:80px">姓名</th>
<th style="min-width:70px">班组</th>
<th style="min-width:70px">打卡工时</th>
<th style="min-width:70px">正常工时</th>
<th style="min-width:70px">加班工时</th>
<th style="min-width:70px">生产工时</th>
<th style="min-width:60px">总产量</th>
<th style="min-width:60px">良品率</th>
<th style="min-width:70px">生产效率</th>
<th style="min-width:60px">加班</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div></div>
<style>
.report-table th{position:sticky;top:0;z-index:2;background:#f8fafc;border-bottom:2px solid #e5e7eb;font-size:12px;font-weight:600;color:#374151;white-space:nowrap;text-align:center}
.report-table td{text-align:center;padding:10px 14px;border-bottom:1px solid #f3f4f6;font-size:13px;white-space:nowrap}
.report-table td:first-child,.report-table th:first-child{text-align:left;position:sticky;left:0;background:inherit;z-index:3}
.overtime{background:#fef2f2;color:#dc2626;font-weight:600}
</style>
{% endblock %}
{% block scripts %}
<script>
(function(){
    document.getElementById("report-date").value=new Date().toISOString().split('T')[0];
    fetch("/api/teams").then(function(r){return r.json()}).then(function(d){
        var sel=document.getElementById("team-filter");
        d.forEach(function(t){var o=document.createElement("option");o.value=t.id;o.textContent=t.name;sel.appendChild(o);});
        loadData();
    });
})();
function loadData(){
    var date=document.getElementById("report-date").value;
    var tid=document.getElementById("team-filter").value;
    var url="/api/reports/daily?date="+date;
    if(tid)url+="&team_id="+tid;
    fetch(url).then(function(r){return r.json()}).then(function(d){
        var tb=document.getElementById("tbody");tb.innerHTML="";
        if(!d.data||d.data.length===0){tb.innerHTML='<tr><td colspan="10" style="text-align:center;color:#9ca3af;padding:40px">暂无数据</td></tr>';return;}
        d.data.forEach(function(r){
            var tr=document.createElement("tr");
            var ot=r.is_overtime?'<span class="overtime">加班</span>':'<span style="color:#9ca3af">-</span>';
            var gr=r.good_rate>0?r.good_rate+'%':'<span style="color:#9ca3af">-</span>';
            var eff=r.efficiency>0?(r.efficiency>=100?'<span style="color:#059669">'+r.efficiency+'%</span>':'<span style="color:#dc2626">'+r.efficiency+'%</span>'):'<span style="color:#9ca3af">-</span>';
            tr.innerHTML='<td><strong>'+r.name+'</strong></td><td>'+(r.department||'')+'</td><td>'+(r.attendance_hours||0)+'h</td><td>'+(r.normal_hours||0)+'h</td><td>'+(r.overtime_hours||0)+'h</td><td>'+(r.production_hours||0)+'h</td><td>'+(r.qty||0)+'</td><td>'+gr+'</td><td>'+eff+'</td><td>'+ot+'</td>';
            tb.appendChild(tr);
        });
    });
}
</script>
{% endblock %}
