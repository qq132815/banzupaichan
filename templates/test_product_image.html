<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>测试产品图片加载</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; font-size: 16px; }
        #result { margin: 20px 0; padding: 10px; background: #f0f0f0; white-space: pre-wrap; }
        #image-container { margin: 20px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>测试产品图片加载</h1>
    <button onclick="testLoadImage()">测试加载图片</button>
    <button onclick="testAPI()">测试API</button>
    
    <div id="result"></div>
    
    <div id="image-container">
        <div id="placeholder">选择工单后显示产品图片</div>
        <img id="product-image" src="" style="max-width:300px;max-height:300px;display:none">
    </div>
    
    <script>
        function testLoadImage() {
            document.getElementById('result').innerHTML = '开始测试...';
            loadProductImage('VF009001');
        }
        
        function testAPI() {
            document.getElementById('result').innerHTML = '测试API...';
            fetch('/api/product-definitions?q=VF009001&page_size=1')
                .then(function(r){return r.json()})
                .then(function(resp){
                    document.getElementById('result').innerHTML = 'API响应:\n' + JSON.stringify(resp, null, 2);
                })
                .catch(function(err){
                    document.getElementById('result').innerHTML = 'API错误: ' + err;
                });
        }
        
        function loadProductImage(productCode) {
            console.log('loadProductImage called with:', productCode);
            var img = document.getElementById('product-image');
            var placeholder = document.getElementById('placeholder');
            
            if(!productCode) {
                img.style.display = 'none';
                placeholder.style.display = 'block';
                document.getElementById('result').innerHTML += '\n没有产品编码';
                return;
            }
            
            document.getElementById('result').innerHTML += '\n查询产品图片: ' + productCode;
            
            fetch('/api/product-definitions?q=' + encodeURIComponent(productCode) + '&page_size=1')
                .then(function(r){return r.json()})
                .then(function(resp){
                    document.getElementById('result').innerHTML += '\nAPI响应: ' + JSON.stringify(resp);
                    var data = resp.data || resp;
                    if(data.length > 0 && data[0].image_path) {
                        img.src = data[0].image_path;
                        img.style.display = 'block';
                        placeholder.style.display = 'none';
                        document.getElementById('result').innerHTML += '\n设置图片路径: ' + data[0].image_path;
                    } else if(data.length > 0 && data[0].image_url) {
                        img.src = data[0].image_url;
                        img.style.display = 'block';
                        placeholder.style.display = 'none';
                        document.getElementById('result').innerHTML += '\n设置图片URL: ' + data[0].image_url;
                    } else {
                        placeholder.innerHTML = '未找到产品图片';
                        document.getElementById('result').innerHTML += '\n未找到图片';
                    }
                })
                .catch(function(err){
                    document.getElementById('result').innerHTML += '\n错误: ' + err;
                });
        }
    </script>
</body>
</html>
