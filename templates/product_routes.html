{% extends "base.html" %}
{% block content %}
<div class="page-header"><h1>🔗 工艺路线</h1>
<div class="page-actions">
<input type="file" id="import-file" accept=".xlsx" style="display:none" onchange="doImport()">
<button class="btn btn-outline readonly-hide" onclick="doExport()">📥 导出</button>
<button class="btn btn-outline readonly-hide" onclick="document.getElementById('import-file').click()">📤 导入</button>
{% if session.get('role') == 'planner' %}
<button class="btn btn-primary readonly-hide" onclick="showAdd()">＋ 新增</button>
{% endif %}
</div>
</div>
<div class="toolbar">
<label>搜索：</label>
<input type="text" id="search" placeholder="搜索路线/产品/工序..." oninput="doSearch()" style="width:260px">
</div>
<div class="card"><div class="card-body">
<div class="table-wrap"><table>
<thead><tr><th>路线编码</th><th>路线名称</th><th>产品编码</th><th>工序列表</th><th>备注</th>{% if session.get('role') == 'planner' %}<th>操作</th>{% endif %}</tr></thead>
<tbody id="tbody"></tbody>
</table></div>
</div></div>
<div class="modal-overlay" id="modal"><div class="modal">
<div class="modal-header"><h3 id="m-title">新增</h3><button class="modal-close" onclick="closeM()">&times;</button></div>
<div class="modal-body">
<div class="form-row"><div class="form-group"><label>路线编码</label><input class="form-control" id="m-code"></div><div class="form-group"><label>路线名称</label><input class="form-control" id="m-name"></div></div>
<div class="form-group"><label>产品编码</label><input class="form-control" id="m-product"></div>
<div class="form-group"><label>工序列表 <span style="color:#9ca3af;font-weight:normal">（用英文逗号分隔，如：自动涂胶,装密封圈,半成品入库）</span></label><input class="form-control" id="m-processes" placeholder="工序1,工序2,工序3"></div>
<div class="form-group"><label>备注</label><input class="form-control" id="m-remark"></div>
</div>
<div class="modal-footer"><button class="btn btn-secondary" onclick="closeM()">取消</button><button class="btn btn-primary" onclick="save()">保存</button></div>
</div></div>

<style>
.readonly-hide{display:none}
</style>

<script>
document.addEventListener("DOMContentLoaded", function(){
    if(USER_ROLE === "team"){
        document.querySelectorAll(".readonly-hide").forEach(function(el){el.style.display="none";});
    }
});
</script>
{% endblock %}
{% block scripts %}
<script>var USER_ROLE="{{ session.get('role','') }}";</script>
<script>
var editId=null;
var allData=[];
function load(){fetch("/api/process-routes").then(function(r){return r.json()}).then(function(d){allData=d;renderRoutes(d);});}
function doSearch(){var q=document.getElementById("search").value.toLowerCase();if(!q){renderRoutes(allData);return;}var filtered=allData.filter(function(r){return (r.route_code||"").toLowerCase().indexOf(q)>=0||(r.route_name||"").toLowerCase().indexOf(q)>=0||(r.product_code||"").toLowerCase().indexOf(q)>=0||(r.process_list||"").toLowerCase().indexOf(q)>=0;});renderRoutes(filtered);}
function renderRoutes(d){var tb=document.getElementById("tbody");tb.innerHTML="";d.forEach(function(r){var tr=document.createElement("tr");var ops='';if("{{ session.get('role','') }}"==="planner"){ops='<td><div class="btn-group"><button class="btn btn-outline btn-sm" onclick="edit('+r.id+')">编辑</button><button class="btn btn-danger btn-sm" onclick="del('+r.id+')">删除</button></div></td>';}tr.innerHTML='<td>'+r.route_code+'</td><td>'+(r.route_name||'')+'</td><td>'+(r.product_code||'')+'</td><td>'+(r.process_list||'')+'</td><td>'+(r.remark||'')+'</td>'+ops;tb.appendChild(tr);});});}
function showAdd(){editId=null;document.getElementById("m-title").textContent="新增工艺路线";["m-code","m-name","m-product","m-processes","m-remark"].forEach(function(id){document.getElementById(id).value=""});document.getElementById("modal").classList.add("show");}
function closeM(){document.getElementById("modal").classList.remove("show");}
function edit(id){fetch("/api/process-routes").then(function(r){return r.json()}).then(function(d){var r=d.find(function(x){return x.id===id});if(!r)return;editId=id;document.getElementById("m-title").textContent="编辑";document.getElementById("m-code").value=r.route_code;document.getElementById("m-name").value=r.route_name||"";document.getElementById("m-product").value=r.product_code||"";document.getElementById("m-processes").value=r.process_list||"";document.getElementById("m-remark").value=r.remark||"";document.getElementById("modal").classList.add("show");});}
function save(){var data={route_code:document.getElementById("m-code").value,route_name:document.getElementById("m-name").value,product_code:document.getElementById("m-product").value,process_list:document.getElementById("m-processes").value,remark:document.getElementById("m-remark").value};if(!data.route_code){toast("路线编码必填","warning");return;}var url=editId?"/api/process-routes/"+editId:"/api/process-routes";api(url,{method:editId?"PUT":"POST",body:data}).then(function(){toast("保存成功","success");closeM();load();}).catch(function(){toast("保存失败","error");});}
function del(id){if(!confirm("确定删除？"))return;api("/api/process-routes/"+id,{method:"DELETE"}).then(function(){toast("已删除","success");load();});}
function doImport(){var f=document.getElementById("import-file").files[0];if(!f)return;var fd=new FormData();fd.append("file",f);fetch("/api/import/process_routes",{method:"POST",body:fd}).then(function(r){return r.json()}).then(function(d){if(d.error)toast(d.error,"error");else{toast("导入 "+d.count+" 条","success");load();}});}
function doExport(){window.location.href="/api/export/process_routes";}
load();
</script>

<style>
.readonly-hide{display:none}
</style>

<script>
document.addEventListener("DOMContentLoaded", function(){
    if(USER_ROLE === "team"){
        document.querySelectorAll(".readonly-hide").forEach(function(el){el.style.display="none";});
    }
});
</script>
{% endblock %}
