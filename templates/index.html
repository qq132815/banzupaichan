{% extends "base.html" %}
{% block content %}
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
#dashboard { display: flex; flex-direction: column; height: calc(100vh - 60px); overflow: hidden; font-family: "Microsoft YaHei", sans-serif; background: #060e18; }

/* ========== Top KPI Cards ========== */
.kpi-bar {
    display: flex; gap: 12px; padding: 12px 16px;
    background: #0a1929; border-bottom: 1px solid #1e3a5f;
    flex-shrink: 0;
}
.kpi-card {
    flex: 1; background: #0d2137; border: 1px solid #1e3a5f;
    border-radius: 6px; padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
}
.kpi-icon {
    width: 42px; height: 42px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
}
.kpi-icon.blue { background: rgba(79,195,247,0.15); color: #4fc3f7; }
.kpi-icon.green { background: rgba(0,230,118,0.15); color: #00e676; }
.kpi-icon.yellow { background: rgba(255,215,64,0.15); color: #ffd740; }
.kpi-icon.red { background: rgba(255,82,82,0.15); color: #ff5252; }
.kpi-info { flex: 1; }
.kpi-label { color: #8eafc4; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
.kpi-value { color: #fff; font-size: 26px; font-weight: bold; line-height: 1.2; }
.kpi-sub { color: #546e7a; font-size: 10px; margin-top: 2px; }

/* ========== Main Content ========== */
.main-content {
    flex: 1; display: flex; overflow: hidden;
}

/* Left: Floor Plan */

.wm-panel label { display:flex; align-items:center; gap:5px; color:#b0bec5; font-size:12px; cursor:pointer; padding:2px 0; }
.wm-panel label:hover { color:#4fc3f7; }
.wm-panel input[type="checkbox"] { accent-color:#4fc3f7; }
.plan-area {
    flex: 1; position: relative; border-right: 1px solid #1e3a5f;
    min-width: 0;
}
.plan-header {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 14px; background: rgba(10,25,41,0.9);
    border-bottom: 1px solid #1e3a5f;
}
.plan-title { color: #4fc3f7; font-size: 14px; letter-spacing: 2px; }
.plan-controls { display: flex; gap: 6px; align-items: center; }
.plan-controls button {
    background: #0d2137; border: 1px solid #1e3a5f; color: #4fc3f7;
    padding: 4px 10px; border-radius: 3px; cursor: pointer; font-size: 11px;
}
.plan-controls button:hover { background: #1e3a5f; }
.plan-controls button.live-on { background: #1b5e20; color: #00e676; border-color: #00e676; }
.plan-canvas-wrap { position: relative; width: 100%; height: 100%; }
#plan-canvas { width: 100%; height: 100%; }
.plan-info {
    position: absolute; bottom: 8px; left: 8px; z-index: 10;
    color: #546e7a; font-size: 10px; background: rgba(10,25,41,0.8);
    padding: 3px 8px; border-radius: 3px; border: 1px solid #1e3a5f;
}
.eq-hover-card {
    position: absolute; background: rgba(0,20,50,0.95); border: 1px solid #4fc3f7;
    color: #e0f0ff; padding: 10px 14px; border-radius: 4px; font-size: 12px;
    display: none; pointer-events: none; z-index: 100; min-width: 200px;
    box-shadow: 0 0 20px rgba(79,195,247,0.3);
    transform: translateY(12px);
}
.eq-hover-card .hc-title { color: #4fc3f7; font-weight: bold; font-size: 14px; margin-bottom: 6px; border-bottom: 1px solid rgba(79,195,247,0.3); padding-bottom: 4px; }
.eq-hover-card .hc-row { display: flex; justify-content: space-between; padding: 2px 0; }
.eq-hover-card .hc-label { color: #8eafc4; }
.eq-hover-card .hc-val { color: #fff; font-weight: 500; }
.hc-status { font-size: 11px; padding: 1px 6px; border-radius: 3px; font-weight: normal; }

/* Left: OEE Panel */
.oee-panel {
    width: 380px; flex-shrink: 0; overflow-y: auto;
    background: #0a1929; border-right: 1px solid #1e3a5f;
    display: flex; flex-direction: column;
}
.oee-panel::-webkit-scrollbar { width: 4px; }
.oee-panel::-webkit-scrollbar-track { background: transparent; }
.oee-panel::-webkit-scrollbar-thumb { background: rgba(79,195,247,0.2); border-radius: 2px; }
.oee-section {
    padding: 14px; border-bottom: 1px solid #1e3a5f;
}
.oee-section-title {
    color: #4fc3f7; font-size: 12px; letter-spacing: 1px;
    margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
}
.oee-section-title::before {
    content: ""; width: 3px; height: 12px; background: #4fc3f7; border-radius: 2px;
}
.oee-gauge-wrap {
    display: flex; align-items: center; gap: 16px; padding: 8px 0;
}
.oee-gauge {
    width: 100px; height: 100px; position: relative; flex-shrink: 0;
}
.oee-gauge svg { transform: rotate(-90deg); }
.oee-gauge-val {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    text-align: center;
}
.oee-gauge-val .big { color: #fff; font-size: 22px; font-weight: bold; }
.oee-gauge-val .unit { color: #8eafc4; font-size: 10px; }
.oee-factors { display: flex; flex-direction: column; gap: 6px; flex: 1; }
.oee-factor {
    display: flex; align-items: center; gap: 8px;
}
.oee-factor-label { color: #8eafc4; font-size: 11px; min-width: 48px; }
.oee-factor-bar-bg {
    flex: 1; height: 6px; background: rgba(79,195,247,0.1); border-radius: 3px; overflow: hidden;
}
.oee-factor-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
.oee-factor-val { color: #fff; font-size: 11px; min-width: 36px; text-align: right; }
.oee-metric-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
}
.oee-metric {
    background: rgba(13,33,55,0.5); border: 1px solid rgba(79,195,247,0.08);
    border-radius: 6px; padding: 10px 12px; text-align: center;
}
.oee-metric-val { color: #fff; font-size: 20px; font-weight: bold; line-height: 1.2; }
.oee-metric-label { color: #8eafc4; font-size: 10px; margin-top: 2px; letter-spacing: 0.5px; }
.oee-equip-list { max-height: 200px; overflow-y: auto; }
.oee-equip-item {
    display: flex; align-items: center; gap: 8px; padding: 5px 0;
    border-bottom: 1px solid rgba(79,195,247,0.05); font-size: 12px;
}
.oee-equip-item:last-child { border-bottom: none; }
.oee-equip-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.oee-equip-name { flex: 1; color: #b0bec5; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.oee-equip-eff { color: #4fc3f7; font-size: 11px; min-width: 36px; text-align: right; }

/* Right: Charts */
.charts-area {
    width: 380px; flex-shrink: 0; overflow-y: auto;
    background: #0a1929; border-left: 1px solid #1e3a5f;
    display: flex; flex-direction: column;
}
.chart-box {
    padding: 12px; border-bottom: 1px solid #1e3a5f;
}
.chart-box-title {
    color: #4fc3f7; font-size: 12px; letter-spacing: 1px;
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.chart-box-title::before {
    content: ""; width: 3px; height: 12px; background: #4fc3f7; border-radius: 2px;
}
.chart-container { width: 100%; height: 200px; }

/* Alert list */
.alert-list { max-height: 180px; overflow-y: auto; }
.alert-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0; border-bottom: 1px solid rgba(79,195,247,0.08);
    font-size: 12px;
}
.alert-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.alert-dot.red { background: #ff5252; }
.alert-dot.yellow { background: #ffd740; }
.alert-text { color: #b0bec5; flex: 1; }
.alert-time { color: #546e7a; font-size: 10px; }

/* No data hint */
.no-data { color: #546e7a; font-size: 12px; text-align: center; padding: 30px; }
</style>

<div id="dashboard">
    <!-- KPI Bar -->
    <div class="kpi-bar">
        <div class="kpi-card">
            <div class="kpi-icon blue">&#9881;</div>
            <div class="kpi-info">
                <div class="kpi-label">设备总数</div>
                <div class="kpi-value" id="kpi-total">--</div>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon green">&#9654;</div>
            <div class="kpi-info">
                <div class="kpi-label">运行中</div>
                <div class="kpi-value" id="kpi-running">--</div>
                <div class="kpi-sub" id="kpi-running-pct"></div>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon yellow">&#9208;</div>
            <div class="kpi-info">
                <div class="kpi-label">待机</div>
                <div class="kpi-value" id="kpi-idle">--</div>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon red">&#9888;</div>
            <div class="kpi-info">
                <div class="kpi-label">故障</div>
                <div class="kpi-value" id="kpi-down">--</div>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-icon green">&#9733;</div>
            <div class="kpi-info">

    <!-- Main -->
    <div class="main-content">
        <!-- Left: OEE Panel -->
        <div class="oee-panel">
            <div class="oee-section">
                <div class="oee-section-title">设备 OEE</div>
                <div class="oee-gauge-wrap">
                    <div class="oee-gauge">

                        </svg>

                    </div>
                    <div class="oee-factors">
                        <div class="oee-factor"><span class="oee-factor-label">稼动率</span><div class="oee-factor-bar-bg"><div class="oee-factor-bar-fill" id="f-avail" style="width:0%;background:#00e676;"></div></div><span class="oee-factor-val" id="f-avail-val">--%</span></div>
                        <div class="oee-factor"><span class="oee-factor-label">性能率</span><div class="oee-factor-bar-bg"><div class="oee-factor-bar-fill" id="f-perf" style="width:0%;background:#4fc3f7;"></div></div><span class="oee-factor-val" id="f-perf-val">--%</span></div>
                        <div class="oee-factor"><span class="oee-factor-label">良品率</span><div class="oee-factor-bar-bg"><div class="oee-factor-bar-fill" id="f-quality" style="width:0%;background:#ffd740;"></div></div><span class="oee-factor-val" id="f-quality-val">--%</span></div>

                    <div class="oee-metric"><div class="oee-metric-val" id="m-good">--</div><div class="oee-metric-label">良品数</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<script>
/* ========== Fabric Canvas (Read-Only) ========== */
var planCanvas = new fabric.Canvas("plan-canvas", {
    backgroundColor: "#060e18",
    selection: false,
    interactive: false
});
var planWrap = document.getElementById("plan-wrap");

function fitPlanCanvas() {
    planCanvas.setWidth(planWrap.clientWidth);
    planCanvas.setHeight(planWrap.clientHeight);
}
fitPlanCanvas();
window.addEventListener("resize", function() { fitPlanCanvas(); });

// Zoom & Pan
planCanvas.on("mouse:wheel", function(opt) {
    var z = planCanvas.getZoom() * Math.pow(0.999, opt.e.deltaY);
    z = Math.max(0.1, Math.min(3, z));
    planCanvas.zoomToPoint({x:opt.e.offsetX,y:opt.e.offsetY}, z);
    opt.e.preventDefault(); opt.e.stopPropagation();
});
var isDrag = false, dX, dY;
planCanvas.on("mouse:down", function(opt) { isDrag=true; dX=opt.e.clientX; dY=opt.e.clientY; });
planCanvas.on("mouse:move", function(opt) {
    if(!isDrag) return;
    var v=planCanvas.viewportTransform;
    v[4]+=opt.e.clientX-dX; v[5]+=opt.e.clientY-dY;
    planCanvas.requestRenderAll(); dX=opt.e.clientX; dY=opt.e.clientY;
});
planCanvas.on("mouse:up", function() { isDrag=false; });

function zoomIn() { var z=Math.min(3,planCanvas.getZoom()*1.2); planCanvas.setZoom(z); planCanvas.renderAll(); }
function zoomOut() { var z=Math.max(0.1,planCanvas.getZoom()/1.2); planCanvas.setZoom(z); planCanvas.renderAll(); }
function resetView() { planCanvas.setViewportTransform([1,0,0,1,0,0]); }

/* ========== Load Layout ========== */
var layoutData = null;
var liveMode = false;
var liveInterval = null;
var liveEqData = {};

function loadLatestLayout() {
    fetch("/api/workshop-layouts").then(function(r){return r.json();}).then(function(d){
        if(d.success && d.data && d.data.length > 0) {
            var layout = d.data[0];
            planCanvas.loadFromJSON(layout.layout_data, function() {
                // Restore custom properties from JSON
                var origObjects = JSON.parse(layout.layout_data).objects || [];
                var idx = 0;
                planCanvas.forEachObject(function(obj) {
                    if(idx < origObjects.length) {
                        var orig = origObjects[idx];
                        obj.customType = orig.customType || "";
                        obj.customName = orig.customName || "";
                        obj.customCode = orig.customCode || "";
                        obj.customStatus = orig.customStatus || "normal";
                        obj.customEqId = orig.customEqId || null;
                        obj.customRemark = orig.customRemark || "";
                    }
                    obj.set({selectable:false,evented:true,hasControls:false,lockMovementX:true,lockMovementY:true});
                    idx++;
                });
                planCanvas.renderAll();
                planCanvas.forEachObject(function(obj){
                    if(!obj.customEqId) return;
                    var label = obj.customName || obj.customCode || "";
                    if(!label) return;
                    if(obj.type==="group"){
                        obj.forEachObject(function(ch){
                            if(ch.type==="text") ch.set("text", label);
                        });
                    } else if(obj.type==="text"){
                        obj.set("text", label);
                    }
                });
                planCanvas.renderAll();
                layoutData = layout;
                document.getElementById("plan-status").textContent = "布局: " + (layout.name||"默认");
                toggleLive(); // Auto-start live mode
            });
        } else {
            document.getElementById("plan-status").textContent = "未保存布局 (请先在编辑器中创建)";
        }
    });
}

/* ========== Live Mode ========== */
function toggleLive() {
    liveMode = !liveMode;
    var btn = document.getElementById("btn-live");
    if(liveMode) {
        btn.classList.add("live-on");
        fetchLiveData();
        liveInterval = setInterval(fetchLiveData, 5000);
    } else {
        btn.classList.remove("live-on");
        if(liveInterval) { clearInterval(liveInterval); liveInterval=null; }
        resetVisuals();
    }
}

function fetchLiveData() {
    fetch("/api/workshop/3d-status").then(function(r){return r.json();}).then(function(d){
        if(!d.success) return;
        liveEqData = {};
        d.data.forEach(function(eq){ liveEqData[eq.id]=eq; });
        updateKPIs(d.data);
        updatePlanVisuals();
        updateCharts(d.data);
        updateAlerts(d.data);
        renderWatermarks(d.data);
    }).catch(function(){});
}

function updateKPIs(list) {
    var total = list.length;
    var running = list.filter(function(e){return e.status==="running";}).length;
    var down = list.filter(function(e){return e.status==="down";}).length;
    var standby = total - running - down;
    var eff = total > 0 ? Math.round(running/total*100) : 0;

    document.getElementById("kpi-total").textContent = total;
    document.getElementById("kpi-running").textContent = running;
    document.getElementById("kpi-running-pct").textContent = total > 0 ? Math.round(running/total*100)+"%" : "";
    document.getElementById("kpi-idle").textContent = standby;
    document.getElementById("kpi-down").textContent = down;
    document.getElementById("kpi-eff").textContent = eff + "%";
}

var statusColors = {
    running: {fill:"#1b5e20",stroke:"#00e676"},
    idle: {fill:"#4a4100",stroke:"#ffd740"},
    down: {fill:"#4a1a1a",stroke:"#ff5252"},
    normal: {fill:"#4a4100",stroke:"#ffd740"}
};

function updatePlanVisuals() {
    planCanvas.forEachObject(function(obj) {
        if(!obj.customEqId) return;
        var eq = liveEqData[obj.customEqId];
        if(!eq) return;
        var sc = statusColors[eq.status] || statusColors.normal;
        obj.customStatus = eq.status;
        if(obj.type==="group") {
            obj.forEachObject(function(ch){
                if(ch.type==="rect") { ch.set("fill",sc.fill); ch.set("stroke",sc.stroke); }
            });
        } else {
            obj.set("fill",sc.fill); obj.set("stroke",sc.stroke);
        }
        obj._liveEq = eq;
        // Update text labels to show device name
        if(obj.type==="group"){
            obj.forEachObject(function(ch){
                if(ch.type==="text") ch.set("text", eq.name || eq.code || "");
            });
        }
    });
    planCanvas.renderAll();
}

function resetVisuals() {
    planCanvas.forEachObject(function(obj){
        if(obj.customEqId && obj.customStatus) {
            var sc = statusColors[obj.customStatus] || statusColors.normal;
            if(obj.type==="group") {
                obj.forEachObject(function(ch){ if(ch.type==="rect"){ch.set("fill",sc.fill);ch.set("stroke",sc.stroke);} });
            } else { obj.set("fill",sc.fill);obj.set("stroke",sc.stroke); }
            obj.set("opacity",1);
        }
    });
    planCanvas.renderAll();
}

/* Hover card */
planCanvas.on("mouse:over", function(opt) {
    if(!liveMode) return;
    var obj = opt.target;
    // Traverse up to group parent for _liveEq (child rects/texts inside groups lack this prop)
    while(obj && !obj._liveEq && obj.group) { obj = obj.group; }
    if(!obj || !obj._liveEq) return;
    var eq = obj._liveEq;
    var st = {running:"运行中",idle:"待机",down:"故障",normal:"待机"};
    var sc = {running:"#00e676",idle:"#ffd740",down:"#ff5252",normal:"#ffd740"};
    var card = document.getElementById("hover-card");
    var sColor = sc[eq.status]||"#546e7a";
    var sLabel = st[eq.status]||eq.status;
    card.innerHTML = '<div class="hc-title">'+(eq.name||eq.code||"")+' <span class="hc-status" style="background:'+sColor+'22;color:'+sColor+';border:1px solid '+sColor+';">'+sLabel+'</span></div>' +
        '<div class="hc-row"><span class="hc-label">班组</span><span class="hc-val">'+(eq.team_name||"--")+'</span></div>' +
        '<div class="hc-row"><span class="hc-label">产量</span><span class="hc-val">'+(eq.report_qty!=null?eq.report_qty:"--")+'</span></div>' +
        '<div class="hc-row"><span class="hc-label">效率</span><span class="hc-val">'+(eq.efficiency!=null?eq.efficiency+"%":"--")+'</span></div>' +
        '<div class="hc-row"><span class="hc-label">订单</span><span class="hc-val">'+(eq.order_no||"--")+'</span></div>' +
        '<div class="hc-row"><span class="hc-label">工序</span><span class="hc-val">'+(eq.process_name||"--")+'</span></div>' +
        '<div class="hc-row"><span class="hc-label">产品</span><span class="hc-val">'+(eq.product_name||"--")+'</span></div>' +
        '<div class="hc-row"><span class="hc-label">报工时间</span><span class="hc-val">'+(eq.report_time||"--")+'</span></div>';
    card.style.display = "block";
});
planCanvas.on("mouse:move", function(opt) {
    if(!liveMode) return;
    var card = document.getElementById("hover-card");
    if(card.style.display==="block") {
        var wrap = document.getElementById("plan-wrap");
        var rect = wrap ? wrap.getBoundingClientRect() : {left:0,top:0};
        var x = opt.e.clientX - rect.left + 16;
        var y = opt.e.clientY - rect.top + 16;
        if(x + 220 > rect.width) x = Math.max(0, x - 236);
        if(y + 180 > rect.height) y = Math.max(0, y - 196);
        card.style.left = x + "px";
        card.style.top = y + "px";
    }
});
planCanvas.on("mouse:out", function() {
    document.getElementById("hover-card").style.display = "none";
});

chartTeam.setOption({

    series: [
        { name: "运行", type: "bar", stack: "total", data: [], itemStyle: { color: "#00e676" } },
        
        { name: "故障", type: "bar", stack: "total", data: [], itemStyle: { color: "#ff5252" } }
    ]
});

function updateCharts(list) {
    // Status pie
    var running = list.filter(function(e){return e.status==="running";}).length;
    var idle = list.filter(function(e){return e.status==="idle";}).length;
    var down = list.filter(function(e){return e.status==="down";}).length;
    var normal = list.length - running - idle - down;
    chartStatus.setOption({ series: [{ data: [
        { value: running, name: "运行中", itemStyle: { color: "#00e676" } },
        
        { value: down, name: "故障", itemStyle: { color: "#ff5252" } },
        { value: normal + idle, name: "待机", itemStyle: { color: "#ffd740" } }
    ] }] });

    // Team bar
    var teams = {};
    list.forEach(function(eq) {
        var tid = eq.team_id || "unknown";
        var tname = eq.team_name || ("班组"+tid);
        if(!teams[tid]) teams[tid] = {name:tname,running:0,idle:0,down:0};
        if(eq.status==="running") teams[tid].running++;
        else if(eq.status==="idle") teams[tid].idle++; // kept for team bars
        else if(eq.status==="down") teams[tid].down++;
    });
    var teamNames = [], tRun=[], tIdle=[], tDown=[];
    Object.keys(teams).forEach(function(k) {
        teamNames.push(teams[k].name);
        tRun.push(teams[k].running);
        tIdle.push(teams[k].idle);
        tDown.push(teams[k].down);
    });
    chartTeam.setOption({
        xAxis: { data: teamNames },
        series: [
            { data: tRun },
            { data: tIdle },
            { data: tDown }
        ]
    });
}

function updateAlerts(list) {
    var alerts = list.filter(function(e){return e.status==="down";});
    var el = document.getElementById("alert-list");
    if(alerts.length === 0) {
        el.innerHTML = '<div class="no-data">暂无告警</div>';
        return;
    }
    var html = "";
    alerts.forEach(function(eq) {
        html += '<div class="alert-item"><span class="alert-dot red"></span>' +
            '<span class="alert-text">'+(eq.code||"")+" "+(eq.name||"")+' - 故障停机</span>' +
            '<span class="alert-time">实时</span></div>';
    });
    el.innerHTML = html;
}

// Load
/* ========== Watermark Display Settings ========== */
var wmSettings = {
    today_output: true,
    efficiency: true,
    quality_rate: false,
    team_name: false,
    current_order: false,
    health_score: false
};

function loadWmSettings() {
    try {
        var saved = localStorage.getItem('wm_settings');
        if(saved) wmSettings = JSON.parse(saved);
    } catch(e){}
    // Apply to checkboxes
    for(var k in wmSettings) {
        var el = document.getElementById('wm-' + k);
        if(el) el.checked = wmSettings[k];
    }
}

function saveWmSettings() {
    for(var k in wmSettings) {
        var el = document.getElementById('wm-' + k);
        if(el) wmSettings[k] = el.checked;
    }
    localStorage.setItem('wm_settings', JSON.stringify(wmSettings));
    // Immediately re-render watermarks so toggles take effect without waiting for poll
    if(liveMode && liveEqData) {
        var list = [];
        for(var id in liveEqData) { if(liveEqData.hasOwnProperty(id)) list.push(liveEqData[id]); }
        renderWatermarks(list);
    }
}

function renderWatermarks(list) {
    if(!liveMode) return;
    planCanvas.forEachObject(function(obj) {
        if(!obj._liveEq) return;
        var eq = null;
        for(var i=0;i<list.length;i++){if(list[i].id===obj._liveEq.id){eq=list[i];break;}}
        if(!eq) return;

        // Remove old watermark texts
        var toRemove = [];
        planCanvas.forEachObject(function(o) {
            if(o._wmParent === obj._liveEq.id) toRemove.push(o);
        });
        toRemove.forEach(function(o){planCanvas.remove(o);});

        // Build watermark lines
        var lines = [];
        if(wmSettings.today_output) lines.push("产量:" + (eq.report_qty != null ? eq.report_qty : "--"));
        if(wmSettings.efficiency) lines.push("效率:" + (eq.efficiency != null ? eq.efficiency + "%" : "--"));
        if(wmSettings.quality_rate) lines.push("良品率:" + (eq.good_rate != null ? eq.good_rate + "%" : "--"));
        if(wmSettings.team_name && eq.team_name) lines.push(eq.team_name);
        if(wmSettings.current_order && eq.order_no) lines.push(eq.order_no);
        if(wmSettings.health_score && eq.report_time) lines.push("报工:" + eq.report_time.substring(5, 16));

        if(lines.length === 0) return;

        // Calculate object dimensions accounting for scale (more reliable than getBoundingRect for groups)
        var scaleX = obj.scaleX || 1;
        var scaleY = obj.scaleY || 1;
        var objW = (obj.width || 0) * scaleX;
        var objH = (obj.height || 0) * scaleY;
        var objLeft = obj.left || 0;
        var objTop = obj.top || 0;
        // Center the watermark text horizontally under the object
        var lineWidth = lines[0] ? lines[0].length * 7 : 0; // approximate text width
        var centerX = objLeft + objW / 2;
        for(var j=0;j<lines.length;j++) {
            var txt = new fabric.Text(lines[j], {
                left: centerX,
                top: objTop + objH + 4 + j * 14,
                originX: "center",
                fontSize: 10,
                fill: "#8eafc4",
                fontFamily: "Microsoft YaHei",
                selectable: false,
                evented: false,
                _wmParent: obj._liveEq.id
            });
            planCanvas.add(txt);
            planCanvas.moveTo(txt, 1);
        }
    });
    planCanvas.renderAll();
}

function toggleWmPanel() {
    var p = document.getElementById('wm-panel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
}
document.addEventListener('click', function(e) {
    var dd = document.querySelector('.wm-dropdown');
    if(dd && !dd.contains(e.target)) {
        var p = document.getElementById('wm-panel');
        if(p) p.style.display = 'none';
    }
});
loadWmSettings();
/* ========== OEE Panel Data ========== */
function loadOeePanel(){
    fetch('/api/workshop/3d-status',{credentials:'same-origin'}).then(function(r){return r.json()}).then(function(d){
        if(!d.success) return;
        var list = d.data || [];
        var total = list.length;
        var running = 0, down = 0;
        var sumEff = 0, effCount = 0;
        var sumQty = 0, sumGood = 0, sumBad = 0, sumHours = 0, reportCount = 0;

        // Collect equipment with report data for ranking
        var equipWithEff = [];

        list.forEach(function(eq){
            if(eq.status === 'running') running++;
            else if(eq.status === 'down') down++;
            if(eq.efficiency != null && eq.efficiency > 0) { sumEff += eq.efficiency; effCount++; }
            if(eq.report_qty != null) { sumQty += eq.report_qty; reportCount++; }
            if(eq.good_qty != null) sumGood += eq.good_qty;
            if(eq.bad_qty != null) sumBad += eq.bad_qty;
            if(eq.report_hours != null) sumHours += eq.report_hours;
            if(eq.efficiency != null && eq.efficiency > 0) {
                equipWithEff.push({name: eq.name || eq.code, efficiency: eq.efficiency, status: eq.status});
            }
        });

        // OEE ring now directly reflects availability (稼动率)
        var avail = total > 0 ? Math.round(running / total * 100) : 0;
        var perf = effCount > 0 ? Math.round(sumEff / effCount) : 0;
        var quality = sumQty > 0 ? Math.round(sumGood / sumQty * 100) : 0;

        // Update gauge with availability so it is never stuck at 0 when there are running devices
        var circ = 2 * Math.PI * 42;
        var arc = circ * avail / 100;
        var oeeArc = document.getElementById('oee-arc');
        if(oeeArc) oeeArc.setAttribute('stroke-dasharray', arc + ' ' + (circ - arc));
        var oeeVal = document.getElementById('oee-val');
        if(oeeVal) oeeVal.textContent = avail;

        // Update factors
        var fa = document.getElementById('f-avail');
        if(fa) fa.style.width = avail + '%';
        var fav = document.getElementById('f-avail-val');
        if(fav) fav.textContent = avail + '%';
        var fp = document.getElementById('f-perf');
        if(fp) fp.style.width = perf + '%';
        var fpv = document.getElementById('f-perf-val');
        if(fpv) fpv.textContent = perf + '%';
        var fq = document.getElementById('f-quality');
        if(fq) fq.style.width = quality + '%';
        var fqv = document.getElementById('f-quality-val');
        if(fqv) fqv.textContent = quality + '%';

        // Update metrics
        var mo = document.getElementById('m-output');
        if(mo) mo.textContent = sumQty;
        var mg = document.getElementById('m-good');
        if(mg) mg.textContent = sumGood;
        var mb = document.getElementById('m-bad');
        if(mb) mb.textContent = sumBad;
        var mh = document.getElementById('m-hours');
        if(mh) mh.textContent = sumHours.toFixed(1);
        var me = document.getElementById('m-eff');
        if(me) me.textContent = effCount > 0 ? Math.round(sumEff/effCount) + '%' : '--';
        var mr = document.getElementById('m-reports');
        if(mr) mr.textContent = reportCount;

        // Equipment ranking (top 10 by efficiency)
        equipWithEff.sort(function(a,b){ return b.efficiency - a.efficiency; });
        var html = '';
        for(var i = 0; i < Math.min(equipWithEff.length, 10); i++) {
            var e = equipWithEff[i];
            var color = e.status === 'running' ? '#00e676' : (e.status === 'down' ? '#ff5252' : '#ffd740');
            html += '<div class="oee-equip-item"><span class="oee-equip-status" style="background:'+color+'"></span><span class="oee-equip-name" title="'+escHtml(e.name)+'">'+escHtml(e.name)+'</span><span class="oee-equip-eff">'+e.efficiency+'%</span></div>';
        }
        var el = document.getElementById('oee-equip-list');
        if(el) el.innerHTML = html || '<div class="no-data">暂无数据</div>';
    }).catch(function(){});
}
loadOeePanel(); setInterval(loadOeePanel, 30000);
loadLatestLayout();
</script>
