<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>3D 车间监控工作台</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: white;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
        }
        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
            display: none;
            pointer-events: none;
            font-size: 14px;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <div id="info">3D 车间监控工作台 - 鼠标悬停查看详情</div>
    <div id="tooltip"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        var scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        
        var camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(50, 50, 50);
        camera.lookAt(0, 0, 0);
        
        var renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        // Floor grid
        var grid = new THREE.GridHelper(200, 20, 0x444444, 0x333333);
        scene.add(grid);
        
        // Lights
        var ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        var directionalLight = new THREE.DirectionalLight(0xffffff, 0.5);
        directionalLight.position.set(1, 1, 1);
        scene.add(directionalLight);
        
        // Equipment group
        var equipmentGroup = new THREE.Group();
        scene.add(equipmentGroup);
        
        // Status colors
        var statusColors = {
            'running': 0x00ff00,
            'idle': 0xffff00,
            'down': 0xff0000,
            'normal': 0xaaaaaa
        };
        
        // Raycaster for interaction
        var raycaster = new THREE.Raycaster();
        var mouse = new THREE.Vector2();
        var tooltip = document.getElementById('tooltip');
        var hoveredObject = null;
        
        // Fetch data
        fetch('/api/workshop/3d-status')
            .then(function(response) { return response.json(); })
            .then(function(data) {
                if (data.success) {
                    renderEquipment(data.data);
                }
            });
        
        function renderEquipment(equipments) {
            var cols = 20;
            equipments.forEach(function(eq, index) {
                var geometry = new THREE.BoxGeometry(4, 3, 4);
                var color = statusColors[eq.status] || 0xaaaaaa;
                var material = new THREE.MeshLambertMaterial({ color: color });
                var mesh = new THREE.Mesh(geometry, material);
                
                // Position in grid
                var col = index % cols;
                var row = Math.floor(index / cols);
                mesh.position.set(col * 6 - 60, 1.5, row * 6 - 60);
                
                mesh.userData = eq;
                equipmentGroup.add(mesh);
                
                // Status light
                var lightGeometry = new THREE.SphereGeometry(0.3, 16, 16);
                var lightMaterial = new THREE.MeshBasicMaterial({ color: color });
                var lightMesh = new THREE.Mesh(lightGeometry, lightMaterial);
                lightMesh.position.set(0, 2, 0);
                mesh.add(lightMesh);
            });
        }
        
        // Mouse interaction
        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            var intersects = raycaster.intersectObjects(equipmentGroup.children);
            
            if (intersects.length > 0) {
                var object = intersects[0].object;
                if (hoveredObject !== object) {
                    hoveredObject = object;
                    var eq = object.userData;
                    tooltip.innerHTML = '<b>' + eq.code + '</b> - ' + eq.name + '<br>' +
                                       '状态: ' + eq.status + '<br>' +
                                       '班组 ID: ' + (eq.team_id || '无');
                    tooltip.style.display = 'block';
                }
                tooltip.style.left = (event.clientX + 10) + 'px';
                tooltip.style.top = (event.clientY + 10) + 'px';
            } else {
                hoveredObject = null;
                tooltip.style.display = 'none';
            }
        }
        
        window.addEventListener('mousemove', onMouseMove, false);
        
        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            
            // Rotate running equipment
            equipmentGroup.children.forEach(function(child) {
                if (child.userData.status === 'running') {
                    child.rotation.y += 0.01;
                }
            });
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Resize handler
        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
