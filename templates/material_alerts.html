{% extends "base.html" %}
{% block title %}备料提醒{% endblock %}
{% block content %}
<div class="alerts-page" style="padding:20px;">
  <h2 style="margin-bottom:20px;">备料提醒</h2>
  <div style="margin-bottom:15px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
    <button onclick="refreshAlerts()" id="btnRefresh" style="background:#1F4E79;color:#fff;border:none;padding:8px 18px;border-radius:4px;cursor:pointer;font-size:14px;">扫描刷新</button>
    <select id="statusFilter" onchange="loadAlerts()" style="padding:8px;border:1px solid #ddd;border-radius:4px;font-size:14px;">
      <option value="">待备料</option>
      <option value="all">全部</option>
      <option value="closed">已领料</option>
    </select>
    <select id="teamFilter" onchange="loadAlerts()" style="padding:8px;border:1px solid #ddd;border-radius:4px;font-size:14px;">
      <option value="">全部班组</option>
    </select>
    <label style="font-size:13px;color:#555;display:flex;align-items:center;gap:4px;">从<input type="date" id="dateFrom" onchange="loadAlerts()" style="padding:6px;border:1px solid #ddd;border-radius:4px;font-size:13px;"></label>
    <label style="font-size:13px;color:#555;display:flex;align-items:center;gap:4px;">到<input type="date" id="dateTo" onchange="loadAlerts()" style="padding:6px;border:1px solid #ddd;border-radius:4px;font-size:13px;"></label>
    <input type="text" id="searchBox" placeholder="搜索单号/产品名称..." oninput="filterAlerts()" style="padding:7px 12px;border:1px solid #ddd;border-radius:4px;font-size:13px;width:200px;">
    <button onclick="batchClose()" id="btnBatchClose" style="background:#e67e22;color:#fff;border:none;padding:8px 18px;border-radius:4px;cursor:pointer;font-size:14px;display:none;">批量已领料</button>
    <span id="alertCount" style="color:#888;font-size:13px;margin-left:10px;"></span>
  </div>
  <div id="loading" style="text-align:center;padding:40px;color:#888;display:none;">加载中...</div>
  <div id="emptyState" style="text-align:center;padding:60px;color:#aaa;display:none;">
    <div style="font-size:48px;margin-bottom:10px;">&#10003;</div>
    <div style="font-size:16px;">暂无备料提醒</div>
  </div>
  <div id="alertsContainer"></div>
</div>
<style>
.alert-group{margin-bottom:24px;border:1px solid #e0e0e0;border-radius:8px;overflow:hidden;transition:all .2s ease}
.alert-group:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.alert-group-header{position:relative;background:#f8f9fa;padding:16px 18px;display:flex;flex-wrap:wrap;align-items:flex-start;gap:10px 12px;border-bottom:1px solid #e0e0e0}
.alert-group-header .parent-info{flex:1 1 260px;min-width:0;text-align:left}
.alert-group-header .header-actions{flex:0 0 auto;display:flex;align-items:center;gap:8px}
.alert-group-header .parent-order{font-weight:bold;color:#1F4E79;font-size:15px;display:inline}
.alert-group-header .parent-product{color:#555;font-size:13px;margin-top:0;margin-left:8px;display:inline}
.alert-group-header .badge{background:#e74c3c;color:#fff;font-size:11px;padding:3px 10px;border-radius:10px}
.alert-group-body{display:none;padding:14px 18px;background:#fcfcfc}
.alert-group-body.open{display:block}
.alerts-page{width:100%;max-width:100%}

/* alert row: left=task card, right=trigger card */
.alert-row{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid #f0f0f0;align-items:stretch}
.alert-row:last-child{border-bottom:none}
.alert-row:hover{background:#fafbfc}

.task-card{flex:1;display:flex;align-items:center;gap:12px;background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:10px 14px}
.task-card .task-checkbox{flex-shrink:0}
.task-card .task-info{flex:1}
.task-card .task-order{font-weight:600;color:#333;font-size:13px}
.task-card .task-product{color:#666;font-size:12px;margin-top:2px}
.task-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1);border-color:#d0d4da;transform:translateY(-1px);transition:all .2s ease}
.task-card .task-actions{flex-shrink:0;display:flex;align-items:center;gap:6px}
.child-progress-inline{margin-top:6px;padding-top:4px;border-top:1px dashed #eee}
.child-progress-inline .process-track{background:#f7f9fb;border:1px solid #e8ecef;border-radius:6px;padding:4px 6px;overflow-x:auto}

.trigger-card{min-width:200px;max-width:260px;background:linear-gradient(135deg,#fff8f0,#fff);border:1.5px solid #f0c040;border-radius:8px;padding:10px 14px;display:flex;flex-direction:column;justify-content:center;gap:6px}
.trigger-card .trigger-label{font-size:11px;color:#999;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.trigger-card .trigger-process{font-size:14px;font-weight:700;color:#d35400;line-height:1.3}
.trigger-card .trigger-qty-row{display:flex;align-items:baseline;gap:6px}
.trigger-card .trigger-qty-num{font-size:22px;font-weight:800;color:#e67e22;line-height:1}
.trigger-card .trigger-qty-unit{font-size:12px;color:#999}
.trigger-card:hover{box-shadow:0 4px 16px rgba(230,126,34,.18);border-color:#e6a020;transform:translateY(-1px);transition:all .2s ease}
.trigger-card .trigger-time{font-size:11px;color:#666;background:#e8f4fd;padding:2px 8px;border-radius:4px;align-self:flex-start}
.trigger-card .trigger-team{font-size:11px;color:#888;background:#f5f5f5;padding:2px 8px;border-radius:4px;align-self:flex-start}

.btn-close{background:#27ae60;color:#fff;border:none;padding:5px 14px;border-radius:4px;cursor:pointer;font-size:12px}
.btn-close:hover{background:#219a52}
.btn-closed{background:#bdc3c7;color:#fff;border:none;padding:5px 14px;border-radius:4px;font-size:12px;cursor:default}

/* BOM card */
.parent-progress-card{display:inline-block;margin:0;padding:4px 10px;background:#f0f4f8;border:1px solid #d8e2ec;border-radius:4px;font-size:13px;vertical-align:middle;margin-left:8px}
.parent-progress-card .pp-label{display:inline;font-size:12px;color:#888;font-weight:500;margin-right:2px}
.parent-progress-track{display:inline-flex;flex-wrap:wrap;gap:0;align-items:center}
.parent-progress-track .pp-node{display:flex;align-items:center;flex-shrink:0}
.parent-progress-track .pp-node .pp-step{display:flex;align-items:center;gap:2px;background:#fff;border:1px solid #dde3ea;border-radius:4px;padding:3px 8px;font-size:12px;white-space:nowrap}
.parent-progress-track .pp-node .pp-step.done{border-color:#28a745;background:#f0faf2}
.parent-progress-track .pp-node .pp-step.active{border-color:#f0ad4e;background:#fffbf0}
.parent-progress-track .pp-node .pp-step.zero{border-color:#dde3ea;background:#f8f9fb}
.parent-progress-track .pp-node .pp-step .pp-name{color:#333;font-weight:500}
.parent-progress-track .pp-node .pp-step .pp-pct{font-weight:700;font-size:12px;padding:2px 6px;border-radius:3px}
.parent-progress-track .pp-node .pp-step .pp-pct.done{background:#d4edda;color:#155724}
.parent-progress-track .pp-node .pp-step .pp-pct.active{background:#fff3cd;color:#856404}
.parent-progress-track .pp-node .pp-step .pp-pct.zero{background:#eee;color:#999}
.parent-progress-track .pp-arrow{color:#ccc;font-size:12px;margin:0 2px;flex-shrink:0}
.bom-card{margin:10px 0;background:#fff;border:1px solid #e4e8ec;border-radius:10px;padding:16px 20px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:all .2s ease}
.bom-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.1);border-color:#c8cdd2;transform:translateY(-1px)}
.bom-card-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.bom-card-header .bom-product{font-weight:700;color:#1F4E79;font-size:15px}
.bom-card-header .bom-qty{color:#666;font-size:12px;background:#eef1f5;padding:3px 10px;border-radius:4px;font-weight:500}
.bom-card-header .bom-order{color:#555;font-size:12px;background:#f5f5f5;padding:3px 10px;border-radius:4px}
.bom-card-header .bom-status{font-size:11px;padding:3px 10px;border-radius:4px;font-weight:500}
.bom-card-header .bom-status.running{background:#d4edda;color:#155724}
.bom-card-header .bom-status.pending{background:#fff3cd;color:#856404}
.bom-card-header .bom-status.none{background:#f0f0f0;color:#999}

/* process track */
.process-track{display:flex;flex-wrap:wrap;gap:0;align-items:stretch;margin-top:6px;width:100%}
.process-node{display:flex;align-items:center;flex-shrink:0}
.process-node .step-card{display:flex;align-items:center;gap:8px;background:#f8f9fb;border:1.5px solid #e0e4e8;border-radius:8px;padding:8px 14px;font-size:12px;line-height:1.4;white-space:nowrap}
.process-node .step-card.done{border-color:#28a745;background:#f0faf2}
.process-node .step-card.active{border-color:#f0ad4e;background:#fffbf0}
.process-node .step-card.zero{border-color:#dde1e6;background:#f8f9fb}
.process-node .step-card .step-name{color:#333;font-weight:600}
.process-node .step-card .step-detail{color:#666;font-size:11px;white-space:nowrap}
.process-node .step-card .step-pct{font-weight:700;padding:2px 8px;border-radius:4px;font-size:11px;white-space:nowrap}
.process-node .step-card .step-pct.done{background:#d4edda;color:#155724}
.process-node .step-card .step-pct.active{background:#fff3cd;color:#856404}
.process-node .step-card .step-pct.zero{background:#eee;color:#999}
.process-arrow{color:#bbb;font-size:18px;margin:0 5px;flex-shrink:0;display:flex;align-items:center}
.progress-bar-wrap{height:4px;background:#eee;border-radius:2px;overflow:hidden;margin-top:3px;min-width:60px}
.progress-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.progress-bar-fill.done{background:#28a745}
.progress-bar-fill.active{background:#f0ad4e}
.progress-bar-fill.zero{background:#ddd}
</style>
<script>
var alertsData=[];
function escHtml(s){if(!s)return'';var d=document.createElement('div');d.appendChild(document.createTextNode(s));return d.innerHTML}
function parseProgress(prog){
  if(!prog)return[];
  var parts=prog.split('->');
  var steps=[];
  for(var i=0;i<parts.length;i++){
    var p=parts[i].trim();
    if(!p)continue;
    var nameMatch=p.match(/^(.+?)[\u3010\uff08]/);
    var qtyMatch=p.match(/\u3010(\d+\.?\d*)\/(\d+\.?\d*)\u3011/);
    var pctMatch=p.match(/\uff08(\d+)%\uff09/);
    var name=nameMatch?nameMatch[1]:p;
    var done=qtyMatch?parseFloat(qtyMatch[1]):0;
    var total=qtyMatch?parseFloat(qtyMatch[2]):0;
    var pct=pctMatch?parseInt(pctMatch[1]):0;
    steps.push({name:name,done:done,total:total,pct:pct})
  }
  return steps
}
function renderSteps(prog){
  var steps=parseProgress(prog);
  if(!steps.length)return'<span style="color:#ccc;font-size:12px;padding:8px 0;display:inline-block;">无进度数据</span>';
  var h='<div class="process-track">';
  for(var i=0;i<steps.length;i++){
    var s=steps[i];
    var cls='zero';
    if(s.pct>=100)cls='done';
    else if(s.pct>0)cls='active';
    if(i>0)h+='<span class="process-arrow">\u2192</span>';
    h+='<div class="process-node"><div class="step-card '+cls+'">';
    h+='<div style="display:flex;flex-direction:column;gap:2px;">';
    h+='<span class="step-name" title="'+escHtml(s.name)+'">'+escHtml(s.name)+'</span>';
    h+='<span class="step-detail">'+s.done+' / '+s.total+'</span>';
    h+='<div class="progress-bar-wrap"><div class="progress-bar-fill '+cls+'" style="width:'+Math.min(s.pct,100)+'%"></div></div>';
    h+='</div>';
    h+='<span class="step-pct '+cls+'">'+s.pct+'%</span>';
    h+='</div></div>'
  }
  h+='</div>';
  return h
}
function renderParentProgress(prog){
  var steps=parseProgress(prog);
  if(!steps.length)return '';
  var h='<div class="parent-progress-card"><div class="parent-progress-track">';
  for(var i=0;i<steps.length;i++){
    var s=steps[i];var cls='zero';
    if(s.pct>=100)cls='done';else if(s.pct>0)cls='active';
    if(i>0)h+='<span class="pp-arrow">\u2192</span>';
    h+='<div class="pp-node"><div class="pp-step '+cls+'">';
    h+='<span class="pp-name" title="'+escHtml(s.name)+'">'+escHtml(s.name)+'</span>';
    h+='<span class="pp-pct '+cls+'">'+s.pct+'%</span>';
    h+='</div></div>'
  }
  h+='</div></div>';
  return h
}
function updateBatchBtn(){var cbs=document.querySelectorAll('.alert-checkbox:checked:not(:disabled)');document.getElementById('btnBatchClose').style.display=cbs.length>0?'inline-block':'none'}
function refreshAlerts(){var b=document.getElementById('btnRefresh');b.disabled=true;b.textContent='扫描中...';fetch('/api/material-alerts/refresh',{method:'POST',credentials:'same-origin'}).then(function(r){return r.json()}).then(function(){b.disabled=false;b.textContent='扫描刷新';loadAlerts()}).catch(function(){b.disabled=false;b.textContent='扫描刷新'})}
function closeAlert(id){if(!confirm('确认标记为已领料？'))return;fetch('/api/material-alerts/'+id+'/close',{method:'POST',credentials:'same-origin'}).then(function(r){return r.json()}).then(function(){loadAlerts()})}
function batchClose(){var cbs=document.querySelectorAll('.alert-checkbox:checked:not(:disabled)'),ids=[];for(var i=0;i<cbs.length;i++)ids.push(parseInt(cbs[i].getAttribute('data-id')));if(!ids.length)return;if(!confirm('确认批量标记 '+ids.length+' 条为已领料？'))return;fetch('/api/material-alerts/close-batch',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:ids})}).then(function(r){return r.json()}).then(function(){loadAlerts()})}

function buildTeamOptions(){
  fetch('/api/teams',{credentials:'same-origin'}).then(function(r){return r.json()}).then(function(d){
    var sel=document.getElementById('teamFilter');
    var cur=sel.value;
    var h='<option value="">全部班组</option>';
    var teams=d.data||d||[];
    for(var i=0;i<teams.length;i++){
      var t=teams[i];
      var name=t.name||t;
      h+='<option value="'+escHtml(name)+'"'+(cur===name?' selected':'')+'>'+escHtml(name)+'</option>'
    }
    sel.innerHTML=h
  }).catch(function(){})
}

function loadAlerts(){
  var sf=document.getElementById('statusFilter').value;
  var tf=document.getElementById('teamFilter').value;
  var df=document.getElementById('dateFrom').value;
  var dt=document.getElementById('dateTo').value;
  var url='/api/material-alerts';
  var params=[];
  if(sf==='closed')params.push('status=closed');
  else if(sf==='all')params.push('status=all');
  if(tf)params.push('team='+encodeURIComponent(tf));
  if(df)params.push('date_from='+df);
  if(dt)params.push('date_to='+dt);
  if(params.length)url+='?'+params.join('&');
  document.getElementById('loading').style.display='block';
  document.getElementById('emptyState').style.display='none';
  document.getElementById('alertsContainer').innerHTML='';
  fetch(url,{credentials:'same-origin'}).then(function(r){return r.json()}).then(function(d){
    document.getElementById('loading').style.display='none';
    alertsData=d.data||[];
    buildTeamOptions();
    document.getElementById('alertCount').textContent='共 '+alertsData.length+' 条记录';
    if(!alertsData.length){document.getElementById('emptyState').style.display='block';return}
    renderAlerts(alertsData)
  }).catch(function(){document.getElementById('loading').style.display='none';document.getElementById('emptyState').style.display='block'})
}

function filterAlerts(){var q=(document.getElementById("searchBox").value||"").toLowerCase().trim();if(!q){renderAlerts(alertsData);document.getElementById("alertCount").textContent="共 "+alertsData.length+" 条记录";return}var filtered=[];for(var i=0;i<alertsData.length;i++){var a=alertsData[i];if((a.child_order_no||"").toLowerCase().indexOf(q)>=0||(a.parent_order_no||"").toLowerCase().indexOf(q)>=0||(a.child_product_name||"").toLowerCase().indexOf(q)>=0||(a.parent_product_name||"").toLowerCase().indexOf(q)>=0||(a.trigger_process||"").toLowerCase().indexOf(q)>=0)filtered.push(a)}renderAlerts(filtered);document.getElementById("alertCount").textContent="搜索结果 "+filtered.length+" / "+alertsData.length+" 条"}
function renderAlerts(alerts){
  var groups={};
  for(var i=0;i<alerts.length;i++){
    var a=alerts[i];var key=a.parent_order_no||'unknown';
    if(!groups[key])groups[key]={parent_order_no:a.parent_order_no,parent_product_code:a.parent_product_code,parent_product_name:a.parent_product_name,parent_progress:a.parent_progress||'',items:[],bom_children:a.bom_children||[]};
    groups[key].items.push(a)
  }
  var h='';
  for(var key in groups){
    var g=groups[key];var pc=0;
    for(var j=0;j<g.items.length;j++){if(g.items[j].status!=='closed')pc++}
    h+='<div class="alert-group"><div class="alert-group-header" onclick="toggleGroup(this)">';
    h+='<span class="arrow">&#9654;</span><div class="parent-info">';
    h+='<div class="parent-order">'+escHtml(g.parent_order_no||'未关联')+'</div>';
    h+='<div class="parent-product">'+escHtml(g.parent_product_name||g.parent_product_code||'')+'</div>';
    if(g.parent_progress)h+=renderParentProgress(g.parent_progress);
    h+='</div>';
    if(pc>0)h+='<span class="badge">待备料 '+pc+'</span>';
    h+='<div class="header-actions"><button class="btn-close" onclick="closeGroup(&quot;'+escHtml(g.parent_order_no||'')+'&quot;)">已领料</button></div>';
    h+='</div><div class="alert-group-body">';
    for(var j=0;j<g.items.length;j++){
      var it=g.items[j];var cl=it.status==='closed';
      h+='<div class="alert-row">';
      h+='<div class="trigger-card">';
      h+='<div class="trigger-label">触发工序</div>';
      h+='<div class="trigger-process">'+escHtml(it.trigger_process)+'</div>';
      h+='<div class="trigger-order" style="font-size:11px;color:#555;margin-top:2px;">'+escHtml(it.child_order_no)+'</div>';
      h+='<div class="trigger-qty-row"><span class="trigger-qty-num">'+(it.trigger_qty||0)+'</span><span class="trigger-qty-unit">件</span></div>';
      if(it.trigger_time)h+='<div class="trigger-time">报工时间: '+escHtml(it.trigger_time)+'</div>';
      if(it.team_name)h+='<div class="trigger-team">班组: '+escHtml(it.team_name)+'</div>';
      h+='</div>';
      h+='<div class="task-card">';
      h+='<input type="checkbox" class="alert-checkbox task-checkbox" data-id="'+it.id+'" '+(cl?'disabled':'')+' onchange="updateBatchBtn()" />';
      h+='<div class="task-info"><div class="task-order">'+escHtml(it.child_order_no)+'</div>';
      h+='<div class="task-product">'+escHtml(it.child_product_name);
      if(it.child_progress)h+='<div class="child-progress-inline">'+renderSteps(it.child_progress)+'</div>';
      h+='</div></div>';
      h+='<div class="task-actions">';
      if(cl){h+='<button class="btn-closed" disabled>已领料</button><span style="font-size:11px;color:#999;">'+escHtml(it.closed_by||'')+' '+escHtml(it.closed_at||'')+'</span>'}
      else{h+='<button class="btn-close" onclick="closeAlert('+it.id+')">已领料</button>'}
      h+='</div></div>';

      h+='</div>'
    }
    h+='</div></div>'
  }
  document.getElementById('alertsContainer').innerHTML=h
}
function closeGroup(parentOrderNo){if(!parentOrderNo)return;var ids=[];for(var i=0;i<alertsData.length;i++){var a=alertsData[i];if((a.parent_order_no||'')===parentOrderNo&&a.status!=='closed'){ids.push(a.id)}}
  if(!ids.length){toast('该工单已领料','info');return}
  fetch('/api/material-alerts/close-batch',{method:'POST',credentials:'same-origin',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids:ids})}).then(function(r){return r.json()}).then(function(){loadAlerts()});}
function toggleGroup(hd){var b=hd.nextElementSibling,a=hd.querySelector('.arrow');if(b.classList.contains('open')){b.classList.remove('open');a.classList.remove('open')}else{b.classList.add('open');a.classList.add('open')}}
document.addEventListener('DOMContentLoaded',function(){loadAlerts()});
</script>
{% endblock %}
