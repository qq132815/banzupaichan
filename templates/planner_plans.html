{% extends "base.html" %}
{% block content %}
<div class="page-header">
<h1>📋 计划记录</h1>
</div>

<!-- ====== TODAY PROGRESS ====== -->
<div class="card" style="margin-bottom:16px">
<div class="card-body" style="padding:16px 20px">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
<h3 style="font-size:15px;color:#374151;margin:0">📊 当日计划进行情况</h3>
<span id="today-date" style="font-size:13px;color:#6b7280"></span>
</div>
<div id="today-progress"></div>
</div>
</div>

<!-- ====== TABS ====== -->
<div class="tabs" style="display:flex;gap:0;border-bottom:2px solid #e5e7eb;padding:0 16px;margin-bottom:16px">
<button class="tab-btn active" onclick="switchTab('approval',this)">计划审批</button>
<button class="tab-btn" onclick="switchTab('completion',this)">计划完成情况</button>
</div>

<!-- TAB: Approval -->
<div id="tab-approval">
<div class="toolbar">
<label>开始：</label><input type="date" id="filter-date-from">
<label>结束：</label><input type="date" id="filter-date-to">
<label>状态：</label><select id="filter-status" onchange="loadApproval()">
<option value="">全部</option><option value="submitted">待审批</option><option value="approved">已通过</option><option value="rejected">已拒绝</option><option value="returned">已退回</option>
</select>
<button class="btn btn-primary" onclick="loadApproval()">查询</button>
</div>
<div class="card"><div class="card-body"><div class="table-wrap"><table>
<thead><tr><th>班组</th><th>计划日期</th><th>状态</th><th>排班数</th><th>提交时间</th><th>是否逾期</th><th>审批时间</th><th>退回原因</th><th>操作</th></tr></thead>
<tbody id="approval-tbody"></tbody>
</table><div id="approval-empty" class="table-empty" style="display:none">暂无计划</div>
</div></div></div>
</div>

<!-- TAB: Completion -->
<div id="tab-completion" style="display:none">
<div class="toolbar">
<label>开始：</label><input type="date" id="comp-date-from">
<label>结束：</label><input type="date" id="comp-date-to">
<label>班组：</label><select id="comp-team-filter" onchange="loadCompletion()"><option value="">全部班组</option></select>
<button class="btn btn-primary" onclick="loadCompletion()">查询</button>
</div>
<div class="card"><div class="card-body"><div class="table-wrap"><table>
<thead><tr><th>班组</th><th>计划日期</th><th>状态</th><th>计划量</th><th>完成量</th><th>完成率</th><th>排班数</th><th>操作</th></tr></thead>
<tbody id="completion-tbody"></tbody>
</table><div id="completion-empty" class="table-empty" style="display:none">暂无计划</div>
</div></div></div>
</div>

<!-- ====== GANTT MODAL ====== -->
<div class="modal-overlay" id="gantt-modal">
<div class="modal" style="max-width:960px;width:95vw">
<div class="modal-header">
<h3 id="gantt-title">甘特图</h3>
<button class="modal-close" onclick="closeGantt()">&times;</button>
</div>
<div class="modal-body" style="padding:0;overflow:hidden">
<div id="gantt-summary" style="padding:12px 20px;background:#f9fafb;border-bottom:1px solid #e5e7eb;font-size:13px;color:#374151"></div>
<div id="gantt-container" style="overflow:auto;max-height:55vh;background:#fff"></div>
</div>
</div>
</div>

<style>
.tab-btn{padding:10px 20px;border:none;background:none;font-size:14px;font-weight:500;color:#6b7280;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}
.tab-btn:hover{color:#3b82f6}
.tab-btn.active{color:#3b82f6;border-bottom-color:#3b82f6}
.progress-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f3f4f6}
.progress-row:last-child{border-bottom:none}
.progress-team{min-width:70px;font-weight:600;font-size:13px}
.progress-bar-wrap{flex:1;height:22px;background:#e5e7eb;border-radius:11px;overflow:hidden;position:relative}
.progress-bar{height:100%;border-radius:11px;transition:width .5s ease}
.progress-text{min-width:140px;font-size:12px;color:#374151;text-align:right}
.progress-detail{min-width:60px;text-align:center}
.progress-detail button{padding:3px 10px;border:1px solid #d1d5db;border-radius:4px;background:#fff;font-size:11px;color:#3b82f6;cursor:pointer}
.progress-detail button:hover{background:#eff6ff}
.gantt-bar{position:absolute;height:20px;border-radius:4px;min-width:4px;top:2px}
.gantt-bar-planned{background:#d1d5db;border:1px solid #9ca3af}
.gantt-bar-actual{background:#3b82f6;border:1px solid #2563eb;opacity:0.85}
.gantt-bar-inprogress{background:#ef4444;border:1px solid #dc2626;opacity:0.85}
.gantt-equip-label{min-width:120px;font-size:12px;color:#374151;padding:6px 8px;border-bottom:1px solid #f3f4f6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-time-cell{border-right:1px solid #f3f4f6;min-width:40px;height:100%}
.gantt-row{display:flex;border-bottom:1px solid #f3f4f6;min-height:30px}
.gantt-time-header{display:flex;border-bottom:2px solid #e5e7eb;background:#f9fafb}
.gantt-time-header span{min-width:40px;text-align:center;font-size:11px;color:#6b7280;padding:4px 0}
</style>
{% endblock %}
{% block scripts %}
<script>
var approvalData=[], completionData=[], todayProgress=[];
window._publishTime='15:00';
var GANTT_HOURS=[];
for(var h=6;h<=22;h++)GANTT_HOURS.push(h);

(function(){
    fetch('/api/settings').then(function(r){return r.json()}).then(function(d){window._publishTime=d.plan_publish_time||'15:00';});
    var now=new Date();var dd=now.getFullYear()+"-"+("0"+(now.getMonth()+1)).slice(-2)+"-"+("0"+now.getDate()).slice(-2);
    document.getElementById('today-date').textContent=dd;
    // Init date pickers
    document.getElementById('filter-date-from').value=dd;
    document.getElementById('filter-date-to').value=dd;
    document.getElementById('comp-date-from').value=(function(){var d=new Date();d.setDate(d.getDate()-30);return d.toISOString().split('T')[0];})();
    document.getElementById('comp-date-to').value=dd;
    // Load teams for filter
    fetch('/api/teams').then(function(r){return r.json()}).then(function(d){
        var sel=document.getElementById('comp-team-filter');
        d.forEach(function(t){var o=document.createElement('option');o.value=t.id;o.textContent=t.name;sel.appendChild(o);});
    });
    loadTodayProgress();
    loadApproval();
})();

// ====== TAB SWITCHING ======
function switchTab(tab,btn){
    document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    document.getElementById('tab-approval').style.display=tab==='approval'?'':'none';
    document.getElementById('tab-completion').style.display=tab==='completion'?'':'none';
    if(tab==='completion')loadCompletion();
}

// ====== TODAY PROGRESS ======
function loadTodayProgress(){
    fetch('/api/plan/today-progress').then(function(r){return r.json()}).then(function(d){
        todayProgress=d.teams||[];
        renderTodayProgress();
    });
}
function renderTodayProgress(){
    var c=document.getElementById('today-progress');
    if(!todayProgress.length){c.innerHTML='<div style="text-align:center;color:#9ca3af;padding:20px">今日暂无排班数据</div>';return;}
    var html='';
    todayProgress.forEach(function(t){
        var rate=Math.min(t.completion_rate,100);
        var color=t.status==='completed'?'#059669':t.status==='in_progress'?'#3b82f6':'#9ca3af';
        var bgColor=t.status==='completed'?'#d1fae5':t.status==='in_progress'?'#dbeafe':'#f3f4f6';
        var statusText=t.status==='completed'?'已完成':t.status==='in_progress'?'进行中':'未开始';
        html+='<div class="progress-row">';
        html+='<div class="progress-team" style="color:'+color+'">'+t.team_name+'</div>';
        html+='<div class="progress-bar-wrap"><div class="progress-bar" style="width:'+rate+'%;background:'+color+'"></div></div>';
        html+='<div class="progress-text">'+t.actual_qty+' / '+t.planned_qty+' ('+t.completion_rate+'%)</div>';
        html+='<div class="progress-detail"><button onclick="openTodayGantt('+t.team_id+','+'\''+t.team_name+'\''+')">详情</button></div>';
        html+='</div>';
    });
    c.innerHTML=html;
}

// ====== APPROVAL ======
function loadApproval(){
    var dtFrom=document.getElementById('filter-date-from').value;
    var dtTo=document.getElementById('filter-date-to').value;
    var st=document.getElementById('filter-status').value;
    var url='/api/daily-plans?';
    if(dtFrom)url+='date_from='+dtFrom+'&';
    if(dtTo)url+='date_to='+dtTo+'&';
    if(st)url+='status='+st;
    fetch(url).then(function(r){return r.json()}).then(function(d){
        approvalData=d||[];
        renderApproval();
    });
}
function renderApproval(){
    var tb=document.getElementById('approval-tbody');
    var empty=document.getElementById('approval-empty');
    if(!approvalData.length){tb.innerHTML='';empty.style.display='';return;}
    empty.style.display='none';
    var html='';
    approvalData.forEach(function(p){
        var map={draft:['badge-gray','草稿'],submitted:['badge-yellow','待审批'],approved:['badge-green','已通过'],rejected:['badge-red','已拒绝'],returned:['badge-orange','已退回']};
        var cls=map[p.status]||['badge-gray',p.status];
        var actions='';
        if(p.status==='submitted'){
            actions='<button class="btn btn-success btn-sm" onclick="approve('+p.id+')">通过</button> <button class="btn btn-danger btn-sm" onclick="reject('+p.id+')">拒绝</button> <button class="btn btn-warning btn-sm" onclick="ret('+p.id+')">退回</button>';
        }else if(p.status==='approved'){
            actions='<button class="btn btn-warning btn-sm" onclick="ret('+p.id+')">退回修改</button>';
        }
        var overdue='-';
        if(p.submitted_at&&window._publishTime){
            var parts=p.submitted_at.split(' ');
            if(parts.length>=2){var t=parts[1].substring(0,5);overdue=t>window._publishTime?'<span class="badge badge-red">逾期</span>':'<span class="badge badge-green">正常</span>';}
        }
        html+='<tr><td><strong>'+(p.team_name||'')+'</strong></td><td>'+p.plan_date+'</td><td><span class="badge '+cls[0]+'">'+cls[1]+'</span></td><td>'+(p.schedule_count||'-')+'</td><td>'+(p.submitted_at||'-')+'</td><td>'+overdue+'</td><td>'+(p.approved_at||'-')+'</td><td>'+(p.reject_reason||'-')+'</td><td>'+actions+'</td></tr>';
    });
    tb.innerHTML=html;
}
function approve(id){if(!confirm('通过此计划？'))return;api('/api/daily-plan/'+id+'/approve',{method:'POST'}).then(function(){toast('已通过','success');loadApproval();});}
function reject(id){var r=prompt('拒绝原因（可选）：');if(r===null)return;api('/api/daily-plan/'+id+'/reject',{method:'POST',body:{reason:r}}).then(function(){toast('已拒绝','success');loadApproval();});}
function ret(id){var r=prompt('退回原因（可选）：');if(r===null)return;api('/api/daily-plan/'+id+'/return',{method:'POST',body:{reason:r}}).then(function(){toast('已退回','success');loadApproval();});}

// ====== COMPLETION ======
function loadCompletion(){
    var df=document.getElementById('comp-date-from').value;
    var dt=document.getElementById('comp-date-to').value;
    var tid=document.getElementById('comp-team-filter').value;
    var url='/api/plan/completion-list?date_from='+df+'&date_to='+dt;
    if(tid)url+='&team_id='+tid;
    fetch(url).then(function(r){return r.json()}).then(function(d){
        completionData=d||[];
        renderCompletion();
    });
}
function renderCompletion(){
    var tb=document.getElementById('completion-tbody');
    var empty=document.getElementById('completion-empty');
    if(!completionData.length){tb.innerHTML='';empty.style.display='';return;}
    empty.style.display='none';
    var html='';
    completionData.forEach(function(p){
        var rate=p.completion_rate||0;
        var rateColor=rate>=100?'#059669':rate>=80?'#d97706':'#dc2626';
        var statusMap={draft:'草稿',submitted:'待审批',approved:'已通过',rejected:'已拒绝',returned:'已退回'};
        var statusBadge=rate>=100?'badge-green':rate>0?'badge-yellow':'badge-gray';
        html+='<tr>';
        html+='<td><strong>'+(p.team_name||'')+'</strong></td>';
        html+='<td>'+p.plan_date+'</td>';
        html+='<td><span class="badge badge-'+(p.status==='approved'?'green':p.status==='submitted'?'yellow':'gray')+'">'+(statusMap[p.status]||p.status)+'</span></td>';
        html+='<td>'+(p.planned_qty||0)+'</td>';
        html+='<td>'+(p.completed_qty||0)+'</td>';
        html+='<td style="color:'+rateColor+';font-weight:600">'+rate+'%</td>';
        html+='<td>'+(p.task_count||0)+'</td>';
        html+='<td><button class="btn btn-outline btn-sm" onclick="openPlanGantt('+p.id+',\''+(p.team_name||'')+'\',\''+p.plan_date+'\')">甘特图</button></td>';
        html+='</tr>';
    });
    tb.innerHTML=html;
}

// ====== GANTT MODAL ======
function openTodayGantt(teamId,teamName){
    document.getElementById('gantt-title').textContent=teamName+' - 当日排班甘特图';
    document.getElementById('gantt-summary').innerHTML='加载中...';
    document.getElementById('gantt-container').innerHTML='';
    document.getElementById('gantt-modal').classList.add('show');
    fetch('/api/plan/today-gantt/'+teamId).then(function(r){return r.json()}).then(function(d){
        renderGanttModal(d,'inprogress');
    });
}
function openPlanGantt(planId,teamName,planDate){
    document.getElementById('gantt-title').textContent=teamName+' - '+planDate+' 计划甘特图';
    document.getElementById('gantt-summary').innerHTML='加载中...';
    document.getElementById('gantt-container').innerHTML='';
    document.getElementById('gantt-modal').classList.add('show');
    fetch('/api/plan/'+planId+'/gantt').then(function(r){return r.json()}).then(function(d){
        renderGanttModal(d,'actual');
    });
}
function closeGantt(){document.getElementById('gantt-modal').classList.remove('show');}

function renderGanttModal(data,mode){
    var schedules=data.schedules||[];
    var reports=data.reports||[];
    var summary=data.summary||{};
    // Summary
    var rate=summary.completion_rate||0;
    var rateColor=rate>=100?'#059669':rate>=80?'#d97706':'#dc2626';
    document.getElementById('gantt-summary').innerHTML=
        '计划量: <strong>'+(summary.total_planned||0)+'</strong> &nbsp;|&nbsp; '+
        '完成量: <strong>'+(summary.total_completed||0)+'</strong> &nbsp;|&nbsp; '+
        '完成率: <span style="color:'+rateColor+';font-weight:700">'+rate+'%</span> &nbsp;|&nbsp; '+
        '排班数: <strong>'+schedules.length+'</strong> &nbsp;|&nbsp; '+
        '报工数: <strong>'+reports.length+'</strong>';

    if(!schedules.length&&!reports.length){
        document.getElementById('gantt-container').innerHTML='<div style="text-align:center;color:#9ca3af;padding:40px">暂无排班数据</div>';
        return;
    }

    // Build equipment -> schedule items
    var equipMap={};
    schedules.forEach(function(s){
        var ename=s.equipment_name||('设备#'+(s.equipment_id||'?'));
        if(!equipMap[ename])equipMap[ename]=[];
        equipMap[ename].push(s);
    });
    // Add report-only items (equipment not in schedule)
    reports.forEach(function(r){
        var ename=r.equipment||'未知设备';
        if(!equipMap[ename])equipMap[ename]=[];
    });

    // Time range
    var minH=22,maxH=6;
    schedules.forEach(function(s){
        if(s.start_time){var h=parseInt(s.start_time.split(':')[0]);if(h<minH)minH=h;}
        if(s.end_time){var h2=parseInt(s.end_time.split(':')[0]);if(h2>maxH)maxH=h2;}
    });
    reports.forEach(function(r){
        if(r.first_start){var h=parseInt(r.first_start.split(' ')[1].split(':')[0]);if(h<minH)minH=h;}
        if(r.last_end){var h2=parseInt(r.last_end.split(' ')[1].split(':')[0]);if(h2>maxH)maxH=h2;}
    });
    if(minH>=maxH){minH=6;maxH=22;}
    var hours=[];
    for(var h=minH;h<=maxH;h++)hours.push(h);
    var cellW=50;
    var labelW=130;

    // Build HTML
    var html='';
    // Time header
    html+='<div class="gantt-time-header"><div style="min-width:'+labelW+'px;border-right:1px solid #e5e7eb;font-size:12px;font-weight:600;color:#374151;padding:4px 8px">设备</div>';
    hours.forEach(function(h){html+='<span style="min-width:'+cellW+'px">'+h+':00</span>';});
    html+='</div>';

    // Rows
    var equips=Object.keys(equipMap);
    equips.forEach(function(ename){
        html+='<div class="gantt-row">';
        html+='<div class="gantt-equip-label" style="width:'+labelW+'px;min-width:'+labelW+'px">'+ename+'</div>';
        html+='<div style="position:relative;flex:1;height:30px">';

        // Background cells
        hours.forEach(function(h,i){
            html+='<div class="gantt-time-cell" style="position:absolute;left:'+(i*cellW)+'px;width:'+cellW+'px;height:100%"></div>';
        });

        // Planned bars (gray)
        var items=equipMap[ename]||[];
        items.forEach(function(s){
            if(!s.start_time||!s.end_time)return;
            var sh=parseInt(s.start_time.split(':')[0])+parseInt(s.start_time.split(':')[1])/60;
            var eh=parseInt(s.end_time.split(':')[0])+parseInt(s.end_time.split(':')[1])/60;
            var left=(sh-minH)*cellW;
            var width=Math.max((eh-sh)*cellW,4);
            html+='<div class="gantt-bar gantt-bar-planned" style="left:'+left+'px;width:'+width+'px" title="'+(s.process_name||'')+' 计划:'+(s.quantity||0)+'"></div>';
        });

        // Actual bars (blue or red)
        reports.forEach(function(r){
            if(!r.first_start||!r.last_end)return;
            var rEquip=r.equipment||'';
            if(rEquip!==ename)return;
            var sh=parseInt(r.first_start.split(' ')[1].split(':')[0])+parseInt(r.first_start.split(' ')[1].split(':')[1])/60;
            var eh=parseInt(r.last_end.split(' ')[1].split(':')[0])+parseInt(r.last_end.split(' ')[1].split(':')[1])/60;
            var left=(sh-minH)*cellW;
            var width=Math.max((eh-sh)*cellW,4);
            var barClass=mode==='inprogress'?'gantt-bar-inprogress':'gantt-bar-actual';
            html+='<div class="gantt-bar '+barClass+'" style="left:'+left+'px;width:'+width+'px;top:4px;height:16px" title="'+(r.process_name||'')+' 实际:'+(r.qty||0)+'"></div>';
        });

        html+='</div></div>';
    });

    // Legend
    html+='<div style="padding:10px 20px;font-size:12px;color:#6b7280;border-top:1px solid #e5e7eb">';
    html+='<span style="display:inline-block;width:14px;height:10px;background:#d1d5db;border:1px solid #9ca3af;border-radius:2px;margin-right:4px;vertical-align:middle"></span> 原计划 &nbsp;&nbsp;';
    if(mode==='inprogress'){
        html+='<span style="display:inline-block;width:14px;height:10px;background:#ef4444;border:1px solid #dc2626;border-radius:2px;margin-right:4px;vertical-align:middle"></span> 生产中';
    }else{
        html+='<span style="display:inline-block;width:14px;height:10px;background:#3b82f6;border:1px solid #2563eb;border-radius:2px;margin-right:4px;vertical-align:middle"></span> 已完成';
    }
    html+='</div>';

    document.getElementById('gantt-container').innerHTML=html;
}
</script>
{% endblock %}
