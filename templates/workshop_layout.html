{% extends "base.html" %}
{% block content %}
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
#editor-container { display: flex; height: calc(100vh - 60px); overflow: hidden; font-family: "Microsoft YaHei", sans-serif; }
.toolbox { width: 220px; background: #0a1929; border-right: 1px solid #1e3a5f; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.toolbox-title { padding: 12px 15px; font-size: 14px; color: #4fc3f7; border-bottom: 1px solid #1e3a5f; letter-spacing: 2px; }
.toolbox-section { padding: 10px 12px; border-bottom: 1px solid #1e3a5f; }
.toolbox-section h4 { color: #8eafc4; font-size: 12px; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
.tool-btn { display: inline-flex; align-items: center; justify-content: center; width: 42px; height: 42px; margin: 2px; background: #0d2137; border: 1px solid #1e3a5f; border-radius: 4px; color: #4fc3f7; cursor: pointer; font-size: 16px; transition: all 0.2s; }
.tool-btn:hover { background: #1e3a5f; border-color: #4fc3f7; }
.eq-list { max-height: 200px; overflow-y: auto; }
.eq-item { display: flex; align-items: center; padding: 5px 10px; cursor: pointer; color: #b0bec5; font-size: 12px; transition: all 0.15s; }
.eq-item:hover { background: #0d2137; color: #4fc3f7; }
.eq-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; flex-shrink: 0; }
.eq-dot.running { background: #00e676; box-shadow: 0 0 4px #00e676; }
.eq-dot.idle { background: #ffd740; box-shadow: 0 0 4px #ffd740; }
.eq-dot.down { background: #ff5252; box-shadow: 0 0 4px #ff5252; }
.eq-dot.normal { background: #546e7a; }
.eq-search { width: 100%; padding: 5px 8px; background: #0d2137; border: 1px solid #1e3a5f; border-radius: 3px; color: #e0f0ff; font-size: 12px; outline: none; margin-bottom: 6px; }
.eq-search:focus { border-color: #4fc3f7; }
.canvas-wrap { flex: 1; position: relative; background: #060e18; min-width: 400px; }
.canvas-toolbar { position: absolute; top: 10px; left: 10px; z-index: 10; display: flex; flex-wrap: wrap; gap: 4px; background: rgba(10,25,41,0.92); padding: 6px 10px; border-radius: 4px; border: 1px solid #1e3a5f; max-width: calc(100% - 20px); }
.canvas-toolbar button { background: #0d2137; border: 1px solid #1e3a5f; color: #4fc3f7; padding: 4px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; white-space: nowrap; }
.canvas-toolbar button:hover { background: #1e3a5f; }
.canvas-toolbar button.danger { color: #ff5252; }
.canvas-toolbar .sep { width: 1px; background: #1e3a5f; margin: 0 2px; }
.canvas-info { position: absolute; bottom: 10px; left: 10px; z-index: 10; color: #546e7a; font-size: 11px; background: rgba(10,25,41,0.85); padding: 4px 10px; border-radius: 3px; border: 1px solid #1e3a5f; }
.canvas-size { position: absolute; bottom: 10px; right: 280px; z-index: 10; display: flex; gap: 6px; align-items: center; background: rgba(10,25,41,0.85); padding: 4px 10px; border-radius: 3px; border: 1px solid #1e3a5f; }
.canvas-size label { color: #8eafc4; font-size: 11px; }
.canvas-size input { width: 60px; padding: 2px 5px; background: #0d2137; border: 1px solid #1e3a5f; border-radius: 3px; color: #e0f0ff; font-size: 11px; text-align: center; }
.props-panel { width: 260px; background: #0a1929; border-left: 1px solid #1e3a5f; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.props-title { padding: 12px 15px; font-size: 14px; color: #4fc3f7; border-bottom: 1px solid #1e3a5f; letter-spacing: 2px; }
.props-body { padding: 12px; flex: 1; }
.prop-group { margin-bottom: 10px; }
.prop-label { display: block; color: #8eafc4; font-size: 11px; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 1px; }
.prop-input { width: 100%; padding: 5px 8px; background: #0d2137; border: 1px solid #1e3a5f; border-radius: 3px; color: #e0f0ff; font-size: 12px; outline: none; }
.prop-input:focus { border-color: #4fc3f7; }
.prop-row { display: flex; gap: 8px; }
.prop-row .prop-group { flex: 1; }
.layout-list { padding: 6px 0; max-height: 150px; overflow-y: auto; }
.layout-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 8px; margin-bottom: 3px; background: #0d2137; border: 1px solid #1e3a5f; border-radius: 3px; cursor: pointer; color: #b0bec5; font-size: 12px; }
.layout-item:hover { border-color: #4fc3f7; color: #4fc3f7; }
.layout-item .del-btn { color: #ff5252; cursor: pointer; padding: 2px 8px; font-size: 11px; pointer-events: auto; user-select: none; border-radius: 3px; } .layout-item .del-btn:hover { background: rgba(255,82,82,0.2); }
.btn-primary { display: block; width: 100%; padding: 7px; background: #1565c0; border: none; border-radius: 4px; color: #fff; cursor: pointer; font-size: 12px; margin-top: 6px; }
.btn-primary:hover { background: #1976d2; }
.btn-secondary { display: block; width: 100%; padding: 7px; background: #0d2137; border: 1px solid #1e3a5f; border-radius: 4px; color: #4fc3f7; cursor: pointer; font-size: 12px; margin-top: 6px; }
.no-select { color: #546e7a; font-size: 12px; text-align: center; padding: 20px; }
.shortcuts-hint { padding: 8px 12px; border-top: 1px solid #1e3a5f; color: #546e7a; font-size: 10px; line-height: 1.8; }
.shortcuts-hint kbd { background: #0d2137; border: 1px solid #1e3a5f; border-radius: 2px; padding: 1px 4px; color: #8eafc4; font-size: 10px; }

/* Live Mode */
.canvas-toolbar button.live-on { background: #1b5e20; color: #00e676; border-color: #00e676; }
.live-badge { position: absolute; top: 10px; right: 280px; z-index: 10; background: rgba(27,94,32,0.9); color: #00e676; padding: 4px 12px; border-radius: 3px; border: 1px solid #00e676; font-size: 12px; display: none; animation: livePulse 2s infinite; }
@keyframes livePulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
.eq-data-overlay { position: fixed; background: rgba(0,20,50,0.92); border: 1px solid #4fc3f7; color: #e0f0ff; padding: 8px 12px; border-radius: 4px; font-size: 12px; display: none; pointer-events: none; z-index: 9999; min-width: 180px; box-shadow: 0 0 15px rgba(79,195,247,0.3); }
.eq-data-overlay .eq-title { color: #4fc3f7; font-weight: bold; margin-bottom: 4px; }
.eq-data-overlay .eq-row { display: flex; justify-content: space-between; padding: 2px 0; }
.eq-data-overlay .eq-label { color: #8eafc4; }
.eq-data-overlay .eq-val { color: #fff; }


/* Background Image Controls */
.bg-controls { position: absolute; bottom: 10px; left: 10px; z-index: 10; background: rgba(10,25,41,0.92); padding: 6px 10px; border-radius: 4px; border: 1px solid #1e3a5f; display: none; align-items: center; gap: 8px; font-size: 11px; color: #8eafc4; }
.bg-controls.active { display: flex; }
.bg-controls label { color: #4fc3f7; }
.bg-controls input[type="range"] { width: 80px; accent-color: #4fc3f7; }
.bg-controls button { background: #0d2137; border: 1px solid #1e3a5f; color: #ff5252; padding: 2px 8px; border-radius: 3px; cursor: pointer; font-size: 10px; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js">

/* ========== Background Image ========== */
var bgImageObj = null;

function importBgImage(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
        var dataUrl = ev.target.result;
        fabric.Image.fromURL(dataUrl, function(img) {
            // Remove old bg image
            if (bgImageObj) { canvas.remove(bgImageObj); }
            // Scale to fit canvas
            var cw = canvas.getWidth();
            var ch = canvas.getHeight();
            var scale = Math.min(cw / img.width, ch / img.height) * 0.9;
            img.set({
                left: cw / 2,
                top: ch / 2,
                originX: 'center',
                originY: 'center',
                scaleX: scale,
                scaleY: scale,
                selectable: true,
                evented: true,
                hasControls: true,
                opacity: 0.5,
                _isBgImage: true
            });
            canvas.add(img);
            canvas.sendToBack(img);
            bgImageObj = img;
            document.getElementById('bg-controls').classList.add('active');
            canvas.renderAll();
        });
    };
    reader.readAsDataURL(file);
    e.target.value = '';
}

function setBgOpacity(val) {
    if (bgImageObj) {
        bgImageObj.set('opacity', parseFloat(val));
        canvas.renderAll();
    }
}

function setBgScale(val) {
    if (bgImageObj) {
        var v = parseFloat(val);
        var cw = canvas.getWidth();
        var ch = canvas.getHeight();
        // Get original image dimensions
        var origW = bgImageObj.width;
        var origH = bgImageObj.height;
        var baseScale = Math.min(cw / origW, ch / origH) * 0.9;
        bgImageObj.set('scaleX', baseScale * v);
        bgImageObj.set('scaleY', baseScale * v);
        canvas.renderAll();
    }
}

function removeBgImage() {
    if (bgImageObj) {
        canvas.remove(bgImageObj);
        bgImageObj = null;
        document.getElementById('bg-controls').classList.remove('active');
        canvas.renderAll();
    }
}
</script>
<script>
var canvas = new fabric.Canvas("fabric-canvas", {
    backgroundColor: "#060e18", selection: true, preserveObjectStacking: true,
    selectionColor: "rgba(79,195,247,0.15)", selectionBorderColor: "#4fc3f7", selectionLineWidth: 1
});
var wrapEl = document.getElementById("canvas-wrap");
var CANVAS_W = 2000, CANVAS_H = 1200;
canvas.setWidth(wrapEl.clientWidth);
canvas.setHeight(wrapEl.clientHeight);
var GRID_SIZE = 20, gridVisible = true, currentLayoutId = null;
var undoStack = [], redoStack = [], MAX_UNDO = 30;

function saveUndo() {
    var json = JSON.stringify(canvas.toJSON(["customType","customName","customCode","customStatus","customEqId","customRemark","isGrid","lockMovementX","lockMovementY","lockScalingX","lockScalingY","lockRotation","hasControls"]));
    undoStack.push(json);
    if (undoStack.length > MAX_UNDO) undoStack.shift();
    redoStack = [];
}
function undoAction() {
    if (undoStack.length < 2) { showInfo("没有可撤销的操作"); return; }
    redoStack.push(undoStack.pop());
    canvas.loadFromJSON(undoStack[undoStack.length-1], function() { canvas.renderAll(); showInfo("已撤销"); });
}
function redoAction() {
    if (redoStack.length === 0) { showInfo("没有可重做的操作"); return; }
    var next = redoStack.pop(); undoStack.push(next);
    canvas.loadFromJSON(next, function() { canvas.renderAll(); showInfo("已重做"); });
}

function drawGrid() {
    var lines = [];
    for (var x = 0; x <= CANVAS_W; x += GRID_SIZE) lines.push(new fabric.Line([x,0,x,CANVAS_H], {stroke:"#0d2137",strokeWidth:1,selectable:false,evented:false}));
    for (var y = 0; y <= CANVAS_H; y += GRID_SIZE) lines.push(new fabric.Line([0,y,CANVAS_W,y], {stroke:"#0d2137",strokeWidth:1,selectable:false,evented:false}));
    var g = new fabric.Group(lines, {selectable:false,evented:false});
    g.set("isGrid", true);
    canvas.add(g); canvas.sendToBack(g);
}
drawGrid();

function toggleGrid() {
    canvas.forEachObject(function(o) { if (o.isGrid) { gridVisible = !gridVisible; o.set("visible", gridVisible); } });
    canvas.renderAll();
}

function resizeCanvas() {
    CANVAS_W = parseInt(document.getElementById("canvas-w").value) || 2000;
    CANVAS_H = parseInt(document.getElementById("canvas-h").value) || 1200;
    showInfo("画布: " + CANVAS_W + " x " + CANVAS_H);
}

window.addEventListener("resize", function() { canvas.setWidth(wrapEl.clientWidth); canvas.setHeight(wrapEl.clientHeight); canvas.renderAll(); });

// Zoom
canvas.on("mouse:wheel", function(opt) {
    var z = canvas.getZoom() * Math.pow(0.999, opt.e.deltaY);
    z = Math.max(0.15, Math.min(5, z));
    canvas.zoomToPoint({x:opt.e.offsetX,y:opt.e.offsetY}, z);
    opt.e.preventDefault(); opt.e.stopPropagation();
});

// Middle mouse pan
var isPanning = false, panX, panY;
canvas.on("mouse:down", function(opt) {
    if (opt.e.button === 1) { isPanning = true; canvas.selection = false; panX = opt.e.clientX; panY = opt.e.clientY; opt.e.preventDefault(); }
});
canvas.on("mouse:move", function(opt) {
    if (isPanning) {
        var v = canvas.viewportTransform;
        v[4] += opt.e.clientX - panX; v[5] += opt.e.clientY - panY;
        canvas.requestRenderAll(); panX = opt.e.clientX; panY = opt.e.clientY;
    }
});
canvas.on("mouse:up", function() { if (isPanning) { isPanning = false; canvas.selection = true; } });
document.getElementById("fabric-canvas").addEventListener("mousedown", function(e) { if (e.button === 1) e.preventDefault(); });

// Snap to grid (hold Shift)
canvas.on("object:moving", function(opt) {
    if (!opt.e.shiftKey) return;
    opt.target.set({ left: Math.round(opt.target.left/GRID_SIZE)*GRID_SIZE, top: Math.round(opt.target.top/GRID_SIZE)*GRID_SIZE });
});

// Auto-save undo on changes
canvas.on("object:added", function() { if (undoStack.length === 0) saveUndo(); });
canvas.on("object:modified", function() { saveUndo(); showProps(); });
canvas.on("object:removed", function() { saveUndo(); });

// Fix equipment group text after resize (called from both drag-resize and property panel)
function fixEquipmentTextAfterResize(obj) {
    if (!obj || obj.customType !== "equipment" || obj.type !== "group") return;
    var sx = obj.scaleX || 1;
    var sy = obj.scaleY || 1;
    if (sx === 1 && sy === 1) return;
    // Adjust text fontSize proportionally
    obj.forEachObject(function(child) {
        if (child.type === "text" || child.type === "i-text") {
            var baseSize = child._baseFontSize || child.fontSize || 11;
            if (!child._baseFontSize) child._baseFontSize = baseSize;
            child.set("fontSize", Math.round(baseSize * (sx + sy) / 2));
        }
    });
    // Reset group scale to 1, apply to rect dimensions
    obj.set({ scaleX: 1, scaleY: 1 });
    obj.forEachObject(function(child) {
        if (child.type === "rect") {
            child.set({
                width: child.width * sx,
                height: child.height * sy,
                scaleX: 1,
                scaleY: 1
            });
        }
    });
    // Reset text baseline for next resize
    obj.forEachObject(function(child) {
        if (child.type === "text" || child.type === "i-text") {
            child._baseFontSize = child.fontSize;
            child.set({ scaleX: 1, scaleY: 1 });
        }
    });
    obj.addWithUpdate();

// Keyboard shortcuts
document.addEventListener("keydown",function(e){
    if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA"||e.target.tagName==="SELECT")return;
    if(e.target.isContentEditable)return;
    if(e.key==="Delete"||e.key==="Backspace"){deleteSelected();e.preventDefault();return;}
    if(e.ctrlKey&&e.key==="z"){undoAction();e.preventDefault();return;}
    if(e.ctrlKey&&e.key==="y"){redoAction();e.preventDefault();return;}
    if(e.ctrlKey&&e.key==="c"){copySelected();e.preventDefault();return;}
    if(e.ctrlKey&&e.key==="v"){pasteClipboard();e.preventDefault();return;}
    if(e.ctrlKey&&e.key==="a"){selectAll();e.preventDefault();return;}
    if(e.key==="Escape"){canvas.discardActiveObject();canvas.renderAll();return;}
    var o=canvas.getActiveObject();if(!o)return;
    var step=e.shiftKey?10:1;
    if(e.key==="ArrowLeft"){o.set("left",o.left-step);canvas.renderAll();e.preventDefault();}
    if(e.key==="ArrowRight"){o.set("left",o.left+step);canvas.renderAll();e.preventDefault();}
    if(e.key==="ArrowUp"){o.set("top",o.top-step);canvas.renderAll();e.preventDefault();}
    if(e.key==="ArrowDown"){o.set("top",o.top+step);canvas.renderAll();e.preventDefault();}
});

/* ========== LIVE MODE ========== */
var liveMode = false;
var liveInterval = null;
var liveData = {};

function toggleLiveMode() {
    liveMode = !liveMode;
    var btn = document.getElementById("btn-live");
    var badge = document.getElementById("live-badge");
    if (liveMode) {
        btn.classList.add("live-on");
        btn.textContent = "实时监控 ON";
        badge.style.display = "block";
        fetchLiveData();
        liveInterval = setInterval(fetchLiveData, 5000);
        showInfo("实时监控已开启 (每5秒刷新)");
    } else {
        btn.classList.remove("live-on");
        btn.textContent = "实时监控";
        badge.style.display = "none";
        if (liveInterval) { clearInterval(liveInterval); liveInterval = null; }
        showInfo("实时监控已关闭");
    }
}

function fetchLiveData() {
    fetch("/api/workshop/3d-status").then(function(r){return r.json();}).then(function(data){
        if (!data.success) return;
        liveData = {};
        data.data.forEach(function(eq) { liveData[eq.id] = eq; });
        updateLiveVisuals();
    }).catch(function(){});
}

function updateLiveVisuals() {
    if (!liveMode) return;
    var sColors = {
        running: { fill: "#1b5e20", stroke: "#00e676" },
        idle: { fill: "#4a4100", stroke: "#ffd740" },
        down: { fill: "#4a1a1a", stroke: "#ff5252" },
        normal: { fill: "#263238", stroke: "#546e7a" }
    };

    canvas.forEachObject(function(obj) {
        if (!obj.customEqId) return;
        var eq = liveData[obj.customEqId];
        if (!eq) return;

        var sc = sColors[eq.status] || sColors.normal;
        obj.customStatus = eq.status;

        // Update fill/stroke
        if (obj.type === "group") {
            obj.forEachObject(function(child) {
                if (child.type === "rect") {
                    child.set("fill", sc.fill);
                    child.set("stroke", sc.stroke);
                }
            });
        } else {
            obj.set("fill", sc.fill);
            obj.set("stroke", sc.stroke);
        }

        // Add live data to object
        obj._liveData = {
            code: eq.code,
            name: eq.name,
            status: eq.status,
            team_id: eq.team_id,
            model: eq.model,
            report_qty: eq.report_qty,
            efficiency: eq.efficiency,
            order_no: eq.order_no,
            process_name: eq.process_name,
            report_time: eq.report_time
        };
    });

    canvas.renderAll();
}

// Hover to show live data overlay - use mouse:move for reliable detection
var _lastHoverObj = null;
canvas.on("mouse:move", function(opt) {
    if (!liveMode) return;
    var overlay = document.getElementById("eq-data-overlay");
    // Position overlay to follow cursor
    overlay.style.left = (opt.e.clientX + 15) + "px";
    overlay.style.top = (opt.e.clientY - 50) + "px";

    var obj = opt.target;
    if (!obj) {
        overlay.style.display = "none";
        _lastHoverObj = null;
        return;
    }
    // Walk up to find group with _liveData
    var liveObj = obj;
    while (liveObj && !liveObj._liveData && liveObj.group) { liveObj = liveObj.group; }
    if (!liveObj || !liveObj._liveData) {
        overlay.style.display = "none";
        _lastHoverObj = null;
        return;
    }
    if (_lastHoverObj === liveObj) return; // same object, skip re-render
    _lastHoverObj = liveObj;
    var d = liveObj._liveData;
    var statusText = { running: "运行中", idle: "待机", down: "故障", normal: "未排班" };
    var statusColor = { running: "#00e676", idle: "#ffd740", down: "#ff5252", normal: "#546e7a" };

    overlay.innerHTML =
        '<div class="eq-title">' + (d.code || d.name || "") + '</div>' +
        '<div class="eq-row"><span class="eq-label">名称</span><span class="eq-val">' + (d.name || "--") + '</span></div>' +
        '<div class="eq-row"><span class="eq-label">状态</span><span class="eq-val" style="color:' + (statusColor[d.status]||"#fff") + '">' + (statusText[d.status]||d.status) + '</span></div>' +
        '<div class="eq-row"><span class="eq-label">产量</span><span class="eq-val">' + (d.report_qty != null ? d.report_qty : "--") + '</span></div>' +
        '<div class="eq-row"><span class="eq-label">效率</span><span class="eq-val">' + (d.efficiency != null ? d.efficiency + "%" : "--") + '</span></div>' +
        '<div class="eq-row"><span class="eq-label">订单</span><span class="eq-val">' + (d.order_no || "--") + '</span></div>' +
        '<div class="eq-row"><span class="eq-label">工序</span><span class="eq-val">' + (d.process_name || "--") + '</span></div>' +
        '<div class="eq-row"><span class="eq-label">报工时间</span><span class="eq-val">' + (d.report_time || "--") + '</span></div>';
    overlay.style.display = "block";
});

canvas.on("mouse:out", function(opt) {
    document.getElementById("eq-data-overlay").style.display = "none";
    _lastHoverObj = null;
});

// Animation loop for live effects
var liveAnimFrame = 0;
function liveAnimation() {
    if (!liveMode) { requestAnimationFrame(liveAnimation); return; }
    liveAnimFrame++;

    canvas.forEachObject(function(obj) {
        if (!obj.customEqId || !obj._liveData) return;
        var status = obj._liveData.status;

        if (status === "running") {
            // Pulse effect
            var pulse = 0.7 + Math.sin(liveAnimFrame * 0.05) * 0.3;
            obj.set("opacity", pulse);
        } else if (status === "down") {
            // Flash effect
            var flash = Math.sin(liveAnimFrame * 0.15) > 0 ? 1 : 0.4;
            obj.set("opacity", flash);
        } else {
            obj.set("opacity", 1);
        }
    });
    canvas.renderAll();
    requestAnimationFrame(liveAnimation);
}

/* ========== Background Image ========== */
var bgImageObj = null;

function importBgImage(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
        var dataUrl = ev.target.result;
        fabric.Image.fromURL(dataUrl, function(img) {
            // Remove old bg image
            if (bgImageObj) { canvas.remove(bgImageObj); }
            // Scale to fit canvas
            var cw = canvas.getWidth();
            var ch = canvas.getHeight();
            var scale = Math.min(cw / img.width, ch / img.height) * 0.9;
            img.set({
                left: cw / 2,
                top: ch / 2,
                originX: 'center',
                originY: 'center',
                scaleX: scale,
                scaleY: scale,
                selectable: true,
                evented: true,
                hasControls: true,
                opacity: 0.5,
                _isBgImage: true
            });
            canvas.add(img);
            canvas.sendToBack(img);
            bgImageObj = img;
            document.getElementById('bg-controls').classList.add('active');
            canvas.renderAll();
        });
    };
    reader.readAsDataURL(file);
    e.target.value = '';
}

function setBgOpacity(val) {
    if (bgImageObj) {
        bgImageObj.set('opacity', parseFloat(val));
        canvas.renderAll();
    }
}

function setBgScale(val) {
    if (bgImageObj) {
        var v = parseFloat(val);
        var cw = canvas.getWidth();
        var ch = canvas.getHeight();
        // Get original image dimensions
        var origW = bgImageObj.width;
        var origH = bgImageObj.height;
        var baseScale = Math.min(cw / origW, ch / origH) * 0.9;
        bgImageObj.set('scaleX', baseScale * v);
        bgImageObj.set('scaleY', baseScale * v);
        canvas.renderAll();
    }
}

function removeBgImage() {
    if (bgImageObj) {
        canvas.remove(bgImageObj);
        bgImageObj = null;
        document.getElementById('bg-controls').classList.remove('active');
        canvas.renderAll();
    }
}
</script>
{% endblock %}
